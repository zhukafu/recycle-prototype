# Nginx 配置 - 合并服务（/ 介绍页 + /mp/ 小程序 + /admin/ 管理后台）
server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ===== 字符集与 MIME =====
    charset utf-8;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ===== Gzip 压缩 =====
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ===== 安全响应头 =====
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ===== /data/ 数据文件：不缓存 =====
    location ^~ /data/ {
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        try_files $uri =404;
    }

    # ===== 带 hash 指纹的构建资源：长期缓存 =====
    location ~* \.(js|css|png|jpg|jpeg|gif|webp|ico|svg|woff2?|ttf|otf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ===== HTML 页面：不缓存 =====
    location ~* \.html$ {
        add_header Cache-Control "no-cache, max-age=0, must-revalidate" always;
        try_files $uri =404;
    }

    # ===== 通用静态文件服务 =====
    location / {
        try_files $uri $uri/ =404;
    }

    # ===== 禁止访问隐藏文件 =====
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
