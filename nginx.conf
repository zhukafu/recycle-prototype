# Nginx 配置 - 静态多页面应用
server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ===== 字符集与 MIME =====
    charset utf-8;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ===== Gzip 压缩 =====
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ===== 安全响应头 =====
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ===== /data/ 数据文件：不缓存（内容会更新，无 hash 指纹）=====
    location ^~ /data/ {
        add_header Cache-Control "public, max-age=0, must-revalidate" always;
        try_files $uri =404;
    }  

    # ===== 静态资源缓存（7 天，仅适用于带 hash 指纹的资源）=====
    location ~* \.(js|css|png|jpg|jpeg|gif|webp|ico|svg|woff2?|ttf|otf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ===== 入口 HTML 路径 =====
    # 默认页：mp 构建产物里入口在 /miniprogram/index.html，所以根路径直接指过去
    location = / {
        add_header Cache-Control "no-cache, max-age=0, must-revalidate" always;
        try_files /miniprogram/index.html =404;
    }

    # 所有 HTML 页面：直接访问文件名
    location ~* \.html$ {
        add_header Cache-Control "no-cache, max-age=0, must-revalidate" always;
        try_files $uri =404;
    }

    # 通用 fallback（处理不带 .html 后缀的 URL）
    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    # ===== 禁止访问隐藏文件 =====
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }
}
