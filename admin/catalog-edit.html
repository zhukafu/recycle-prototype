<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>编辑型号 - 铝老板管理后台</title>
    <script src="/lib/tailwind/tailwind.js"></script>
    <link href="/lib/fonts/fonts-admin-main.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: {
                colors: {
                    brand: { 50:'#f0fdf4',100:'#dcfce7',200:'#bbf7d0',500:'#22c55e',600:'#16a34a',700:'#15803d' },
                    metal: { 50:'#f8fafc',100:'#f1f5f9',200:'#e2e8f0',300:'#cbd5e1',400:'#94a3b8',500:'#64748b',600:'#475569',700:'#334155',800:'#1e293b',900:'#0f172a' }
                },
                fontFamily: { sans: ['Noto Sans SC','system-ui','sans-serif'], mono: ['JetBrains Mono','monospace'] }
            } }
        }
    </script>
    <style>
        body { font-family: 'Noto Sans SC', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        .admin-app { min-height: 100vh; background: #f5f5f5; }
        .admin-sticky-header { position: sticky; top: 0; z-index: 40; background: #ffffff; }
        .admin-content { padding-bottom: 80px; }
        .content-inner { max-width: 1200px; margin: 0 auto; }
        .input { width: 100%; height: 40px; padding: 0 12px; background: #f1f5f9; border-radius: 10px; font-size: 13px; color: #0f172a; outline: none; border: 0; }
        .input:focus { background: #ffffff; box-shadow: 0 0 0 2px #22c55e; }
        textarea.input { height: auto; padding: 10px 12px; resize: none; }
        .field-label { display: block; font-size: 12px; font-weight: 600; color: #334155; margin-bottom: 6px; }
        @media (min-width: 1024px) {
            .admin-content { min-height: calc(100vh - 44px); padding-bottom: 72px; }
            .content-inner { padding: 0 24px; }
        }
    </style>
</head>
<body class="bg-gray-100">

<div class="admin-app">
    <header class="admin-sticky-header">
        <div id="admin-topbar"></div>
    </header>

    <main class="admin-content">
        <div class="content-inner px-4 lg:px-0 py-4 space-y-3">

            <!-- 基本信息 -->
            <section class="bg-white rounded-[14px] p-4 shadow-[0_2px_8px_rgba(0,0,0,0.03)]">
                <h3 class="text-[14px] font-bold text-metal-900 mb-3">基本信息</h3>
                <div class="space-y-3">
                    <div>
                        <label class="field-label">型号名称 *</label>
                        <input class="input" placeholder="如：CJX2-1210" value="CJX2-1210">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="field-label">品牌</label>
                            <select class="input">
                                <option>正泰</option><option>德力西</option><option>人民</option><option>施耐德</option><option>西门子</option>
                            </select>
                        </div>
                        <div>
                            <label class="field-label">类型</label>
                            <select class="input">
                                <option>交流接触器</option><option>直流接触器</option><option>银触点</option>
                            </select>
                        </div>
                    </div>
                    <div>
                        <label class="field-label">所属分类</label>
                        <select class="input">
                            <option>正泰接触器</option><option>德力西接触器</option><option>施耐德接触器</option>
                        </select>
                    </div>
                    <div>
                        <label class="field-label">产品图片</label>
                        <div class="flex gap-2">
                            <div class="w-20 h-20 rounded-[10px] bg-metal-50 overflow-hidden border border-metal-100">
                                <img src="/images/products/c08-zhengtai-cjx2-1210.jpg" class="w-full h-full object-cover" alt="">
                            </div>
                            <button class="w-20 h-20 rounded-[10px] border-2 border-dashed border-metal-200 text-metal-400 flex flex-col items-center justify-center gap-1 text-[11px] tap-active">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                                添加
                            </button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 回收价与付费信息 -->
            <section class="bg-white rounded-[14px] p-4 shadow-[0_2px_8px_rgba(0,0,0,0.03)]">
                <h3 class="text-[14px] font-bold text-metal-900 mb-3">回收价与付费信息</h3>
                <div class="space-y-3">
                    <div class="grid grid-cols-2 gap-3">
                        <div><label class="field-label">普通展示价</label><input class="input font-mono" value="160.00"></div>
                        <div><label class="field-label">银点铜回收价</label><input class="input font-mono" value="7.36/g"></div>
                    </div>
                    <div class="grid grid-cols-3 gap-3">
                        <div><label class="field-label">白银重量(g)</label><input class="input font-mono" value="12.5000"></div>
                        <div><label class="field-label">白银纯度</label><input class="input font-mono" value="76%"></div>
                        <div><label class="field-label">白银价值</label><input class="input font-mono" value="149.15"></div>
                    </div>
                    <div class="grid grid-cols-3 gap-3">
                        <div><label class="field-label">烤点铜(g)</label><input class="input font-mono" value="0.0970"></div>
                        <div><label class="field-label">纯度</label><input class="input font-mono" value="50%"></div>
                        <div><label class="field-label">价值</label><input class="input font-mono" value="4.37"></div>
                    </div>
                    <div class="grid grid-cols-3 gap-3">
                        <div><label class="field-label">漆包铜(g)</label><input class="input font-mono" value="0.0900"></div>
                        <div><label class="field-label">纯度</label><input class="input font-mono" value="90%"></div>
                        <div><label class="field-label">价值</label><input class="input font-mono" value="6.48"></div>
                    </div>
                </div>
            </section>

            <!-- 付费说明与权限 -->
            <section class="bg-white rounded-[14px] p-4 shadow-[0_2px_8px_rgba(0,0,0,0.03)]">
                <h3 class="text-[14px] font-bold text-metal-900 mb-3">付费说明与权限</h3>
                <textarea class="input" rows="3" placeholder="请输入拆解说明、含量说明或会员可见说明">总重1.4 银铜110 线圈90 考点12.5</textarea>
                <div class="grid grid-cols-2 gap-3 mt-3">
                    <div><label class="field-label">会员可见</label><select class="input"><option>是</option><option>否</option></select></div>
                    <div><label class="field-label">上架状态</label><select class="input"><option>已上架</option><option>已下架</option></select></div>
                </div>
            </section>

            <!-- 操作 -->
            <div class="flex gap-3 pt-2">
                <button class="flex-1 h-11 rounded-full bg-metal-100 text-metal-700 text-[14px] font-semibold tap-active">取消</button>
                <button class="flex-1 h-11 rounded-full bg-brand-500 text-white text-[14px] font-semibold tap-active shadow-[0_4px_12px_rgba(34,197,94,0.25)]">保存</button>
            </div>
            <div class="h-4"></div>
        </div>
    </main>

    <div id="admin-bottom-nav"></div>
</div>

<script type="module">
    import { mountAdminTopbar } from '/src/components/admin-topbar.js';
    import { mountAdminBottomNav } from '/src/components/admin-bottom-nav.js';

    mountAdminTopbar('#admin-topbar', {
        title: '编辑型号',
        back: true,
        onMenu: () => openActionMenu(['保存草稿', '预览', '刷新']),
        onAvatar: () => location.href = 'system.html',
    });
    mountAdminBottomNav('#admin-bottom-nav', { active: 'home' });

    function openActionMenu(items) {
        const existing = document.getElementById('__action_menu__');
        if (existing) existing.remove();
        const menu = document.createElement('div');
        menu.id = '__action_menu__';
        menu.className = 'fixed inset-0 z-[60] flex items-end justify-center';
        menu.innerHTML = `
          <div class="absolute inset-0 bg-black/40" data-close></div>
          <div class="relative w-full bg-white rounded-t-2xl p-2 pb-6 animate-up">
            <div class="w-10 h-1 bg-metal-200 rounded-full mx-auto my-2"></div>
            ${items.map(t => `<button class="w-full text-left px-4 py-3.5 text-[14px] text-metal-800 active:bg-metal-50 rounded-xl">${t}</button>`).join('')}
            <button class="w-full text-left px-4 py-3.5 text-[14px] text-rose-600 font-medium active:bg-metal-50 rounded-xl mt-2" data-close>取消</button>
          </div>`;
        document.body.appendChild(menu);
        menu.querySelectorAll('[data-close]').forEach(el => el.addEventListener('click', () => menu.remove()));
    }
</script>

</body>
</html>
