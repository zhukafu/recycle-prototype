    <style>
        body { font-family: 'Noto Sans SC', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 容器布局 */
        .admin-app {
            min-height: 100vh;
            background: #f5f5f5;
        }
        .admin-sticky-header {
            position: sticky;
            top: 0;
            z-index: 40;
            background: #ffffff;
        }
        .admin-body {
            display: block;
        }
        .admin-content {
            padding-bottom: 80px; /* 移动端留出底部导航空间 */
        }
        .content-inner {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* 卡片滑动 */
        .card-scroll {
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
        .snap-card {
            scroll-snap-align: start;
            flex-shrink: 0;
        }
        
        /* 统计卡片渐变 */
        .stat-gradient-1 {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
        }
        .stat-gradient-2 {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        }
        .stat-gradient-3 {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        }
        .stat-gradient-4 {
            background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
        }
        
        /* 底部导航安全区 */
        .safe-bottom {
            padding-bottom: env(safe-area-inset-bottom, 0px);
        }
        
        /* 点击反馈 */
        .tap-active:active {
            transform: scale(0.97);
            opacity: 0.9;
        }
        
        /* 动画 */
        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-up {
            animation: slideInUp 0.4s ease-out forwards;
        }
        .delay-1 { animation-delay: 0.05s; }
        .delay-2 { animation-delay: 0.1s; }
        .delay-3 { animation-delay: 0.15s; }
        .delay-4 { animation-delay: 0.2s; }
        
        /* 导航栏图标动画 */
        .nav-item {
            transition: all 0.2s ease;
        }
        .nav-item.active {
            color: #22c55e;
        }
        .nav-item:not(.active) {
            color: #94a3b8;
        }
        
        @media (min-width: 768px) {
            .search-bar { padding: 1rem 1rem; }
            .card-scroll { overflow-x: visible; }
            .snap-card { width: auto; }
        }

        @media (min-width: 1024px) {
            .admin-body {
                display: block; /* 侧边栏是 fixed，不再用 flex 占据空间 */
            }
            .admin-content {
                margin-left: 0; /* 导航回到底部整宽，主体也恢复满宽 */
                min-height: calc(100vh - 44px);
                padding-bottom: 72px; /* 桌面端底部导航条 56px + 安全间距 */
            }
            .content-inner {
                padding: 0 24px;
            }
            .card-scroll { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 1rem; }
            .quick-entry-grid { grid-template-columns: repeat(6, minmax(0, 1fr)); }
            .chart-layout { display: flex; gap: 1rem; }
            .chart-aside { width: 320px; flex-shrink: 0; }
            .desktop-topbar { display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
            .desktop-topbar .search-bar { flex: 1; margin-right: 1rem; }
        }
    </style>
</head>
