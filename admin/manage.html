    <style>
        body { font-family: 'Noto Sans SC', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 容器布局 */
        .admin-app {
            min-height: 100vh;
            background: #f5f5f5;
        }
        .admin-sticky-header {
            position: sticky;
            top: 0;
            z-index: 40;
            background: #ffffff;
        }
        .admin-body {
            display: block;
        }
        .admin-content {
            padding-bottom: 80px; /* 移动端留出底部导航空间 */
        }
        .content-inner {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* 卡片滑动 */
        .card-scroll {
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }
        .snap-card {
            scroll-snap-align: start;
            flex-shrink: 0;
        }
        
        /* 统计卡片渐变 */
        .stat-gradient-1 {
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
        }
        .stat-gradient-2 {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        }
        .stat-gradient-3 {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        }
        .stat-gradient-4 {
            background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
        }
        
        /* 底部导航安全区 */
        .safe-bottom {
            padding-bottom: env(safe-area-inset-bottom, 0px);
        }
        
        /* 点击反馈 */
        .tap-active:active {
            transform: scale(0.97);
            opacity: 0.9;
        }
        
        /* 动画 */
        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-up {
            animation: slideInUp 0.4s ease-out forwards;
        }
        .delay-1 { animation-delay: 0.05s; }
        .delay-2 { animation-delay: 0.1s; }
        .delay-3 { animation-delay: 0.15s; }
        .delay-4 { animation-delay: 0.2s; }
        
        /* 导航栏图标动画 */
        .nav-item {
            transition: all 0.2s ease;
        }
        .nav-item.active {
            color: #22c55e;
        }
        .nav-item:not(.active) {
            color: #94a3b8;
        }
        
        @media (min-width: 768px) {
            .search-bar { padding: 1rem 1rem; }
            .card-scroll { overflow-x: visible; }
            .snap-card { width: auto; }
        }

        @media (min-width: 1024px) {
            .admin-body {
                display: block; /* 侧边栏是 fixed，不再用 flex 占据空间 */
            }
            .admin-content {
                margin-left: 0; /* 导航回到底部整宽，主体也恢复满宽 */
                min-height: calc(100vh - 44px);
                padding-bottom: 72px; /* 桌面端底部导航条 56px + 安全间距 */
            }
            .content-inner {
                padding: 0 24px;
            }
            .card-scroll { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 1rem; }
            .quick-entry-grid { grid-template-columns: repeat(6, minmax(0, 1fr)); }
            .chart-layout { display: flex; gap: 1rem; }
            .chart-aside { width: 320px; flex-shrink: 0; }
            .desktop-topbar { display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
            .desktop-topbar .search-bar { flex: 1; margin-right: 1rem; }
        }
    </style>
</head>

        import { mountAdminTopbar } from '/src/components/admin-topbar.js';
        import { mountAdminBottomNav } from '/src/components/admin-bottom-nav.js';

        // 首页：一级菜单，不显示返回按钮
        mountAdminTopbar('#admin-topbar', {
            title: '首页',
            back: false,
            // onMenu: 使用组件默认行为（弹出清除缓存菜单）
            // onAvatar: 使用组件默认行为（回到后台首页）
        });
        mountAdminBottomNav('#admin-bottom-nav', { active: 'home' });
    </script>

    <script>
        (function () {
            var input = document.getElementById('home-search');
            var clearBtn = document.getElementById('home-search-clear');

            // 显示/隐藏清除按钮
            input.addEventListener('input', function () {
                clearBtn.classList.toggle('hidden', !input.value);
            });

            // 点击清除
            clearBtn.addEventListener('click', function () {
                input.value = '';
                clearBtn.classList.add('hidden');
                input.focus();
            });

            // 回车跳转型号管理
            input.addEventListener('keydown', function (e) {
                if (e.key === 'Enter' || e.keyCode === 13) {
                    var q = input.value.trim();
                    if (q) {
                        location.href = 'catalog-list.html?q=' + encodeURIComponent(q);
                    }
                }
            });
        })();
    </script>

    <!-- 后台统计数据动态加载 -->
    <script>
        (function () {
            try {
                // 始终基于当前日期生成演示数据，确保日期和数值对齐
                var todayStrLocal = new Date().toDateString();

                // 生成演示数据（基于当前日期，7天）
                function generateDemoStats() {
                    var ds = {
                        today: todayStrLocal,
                        todayPageViews: 0,
                        todayModelQueries: 0,
                        todayPriceViews: 0,
                        todayUnitWeightViews: 0,
                        todayPaidClicks: 0,
                        yesterdayPageViews: 0,
                        yesterdayModelQueries: 0,
                        yesterdayPriceViews: 0,
                        yesterdayUnitWeightViews: 0,
                        yesterdayPaidClicks: 0,
                        pageViewsHistory: [],
                        cumulativePageViews: 0,
                        cumulativeModelQueries: 0,
                        cumulativePriceViews: 0,
                        cumulativeUnitWeightViews: 0
                    };
                    var now = new Date();
                    var totalPageDemo = 0;
                    for (var dd = 6; dd >= 0; dd--) {
                        var day = new Date(now);
                        day.setDate(day.getDate() - dd);
                        var c = Math.floor(Math.random() * 40) + 5;
                        totalPageDemo += c;
                        ds.pageViewsHistory.push({ date: day.toDateString(), count: c });
                    }
                    ds.todayPageViews = ds.pageViewsHistory[6].count;
                    ds.yesterdayPageViews = ds.pageViewsHistory[5].count;
                    ds.yesterdayModelQueries    = Math.floor(Math.random() * 15) + 3;
                    ds.yesterdayPriceViews      = Math.floor(Math.random() * 12) + 2;
                    ds.yesterdayUnitWeightViews = Math.floor(Math.random() * 8) + 1;
                    ds.yesterdayPaidClicks      = Math.floor(Math.random() * 5) + 1;
                    ds.cumulativePageViews       = totalPageDemo;
                    ds.cumulativeModelQueries    = Math.floor(Math.random() * 80) + 20;
                    ds.cumulativePriceViews      = Math.floor(Math.random() * 60) + 10;
                    ds.cumulativeUnitWeightViews = Math.floor(Math.random() * 40) + 5;
                    return ds;
                }

                var stats = generateDemoStats();

                // 格式化数字（加千分位逗号）
                function fmt(n) {
                    if (n == null || isNaN(n)) return '0';
                    return Number(n).toLocaleString('zh-CN');
                }

                // 计算增长率
                function growth(today, yesterday) {
                    var t = Number(today) || 0;
                    var y = Number(yesterday) || 0;
                    if (y === 0) return '--';
                    var pct = ((t - y) / y * 100);
                    return (pct >= 0 ? '+' : '') + pct.toFixed(1) + '%';
                }

                // 日期格式化：toDateString() 转 MM-DD
                function fmtDate(dateStr) {
                    if (!dateStr) return '--';
                    var parts = ('' + dateStr).split(' ');
                    if (parts.length >= 3) {
                        var monthMap = {Jan:'01',Feb:'02',Mar:'03',Apr:'04',May:'05',Jun:'06',Jul:'07',Aug:'08',Sep:'09',Oct:'10',Nov:'11',Dec:'12'};
                        return (monthMap[parts[1]] || '??') + '-' + (parts[2] || '??');
                    }
                    return dateStr;
                }

                // 仅从 localStorage 读取今日统计数据（卡片数据），曲线历史始终使用基于当前日期生成的演示数据
                try {
                    var raw = localStorage.getItem('_AL_STATS_DATA');
                    if (raw) {
                        var realStats = JSON.parse(raw);
                        if (realStats && typeof realStats === 'object' && realStats.today === todayStrLocal) {
                            stats.todayPageViews        = Number(realStats.todayPageViews) || 0;
                            stats.todayModelQueries     = Number(realStats.todayModelQueries) || 0;
                            stats.todayPriceViews       = Number(realStats.todayPriceViews) || 0;
                            stats.todayUnitWeightViews  = Number(realStats.todayUnitWeightViews) || 0;
                            stats.todayPaidClicks       = Number(realStats.todayPaidClicks) || 0;
                            stats.yesterdayPageViews        = Number(realStats.yesterdayPageViews) || 0;
                            stats.yesterdayModelQueries     = Number(realStats.yesterdayModelQueries) || 0;
                            stats.yesterdayPriceViews       = Number(realStats.yesterdayPriceViews) || 0;
                            stats.yesterdayUnitWeightViews  = Number(realStats.yesterdayUnitWeightViews) || 0;
                            stats.yesterdayPaidClicks       = Number(realStats.yesterdayPaidClicks) || 0;
                            stats.cumulativePageViews       = Number(realStats.cumulativePageViews) || stats.cumulativePageViews;
                            stats.cumulativeModelQueries    = Number(realStats.cumulativeModelQueries) || stats.cumulativeModelQueries;
                            stats.cumulativePriceViews      = Number(realStats.cumulativePriceViews) || stats.cumulativePriceViews;
                            stats.cumulativeUnitWeightViews = Number(realStats.cumulativeUnitWeightViews) || stats.cumulativeUnitWeightViews;
                            // 注意：pageViewsHistory 保留演示数据，不替换
                        }
                    }
                } catch (e) { /* localStorage 不可用，使用演示数据 */ }

                // 更新4个统计卡片
                var elPageViews = document.getElementById('statPageViews');
                var elModelQueries = document.getElementById('statModelQueries');
                var elPriceViews = document.getElementById('statPriceViews');
                var elPaidClicks = document.getElementById('statPaidClicks');
                if (elPageViews) elPageViews.textContent = fmt(stats.todayPageViews);
                if (elModelQueries) elModelQueries.textContent = fmt(stats.todayModelQueries);
                if (elPriceViews) elPriceViews.textContent = fmt(stats.todayPriceViews);
                if (elPaidClicks) elPaidClicks.textContent = fmt(stats.todayPaidClicks);

                // 更新增长率
                var gPageViews = document.getElementById('growthPageViews');
                var gModelQueries = document.getElementById('growthModelQueries');
                var gPriceViews = document.getElementById('growthPriceViews');
                var gPaidClicks = document.getElementById('growthPaidClicks');
                if (gPageViews) gPageViews.textContent = growth(stats.todayPageViews, stats.yesterdayPageViews);
                if (gModelQueries) gModelQueries.textContent = growth(stats.todayModelQueries, stats.yesterdayModelQueries);
                if (gPriceViews) gPriceViews.textContent = growth(stats.todayPriceViews, stats.yesterdayPriceViews);
                if (gPaidClicks) gPaidClicks.textContent = growth(stats.todayPaidClicks, stats.yesterdayPaidClicks);

                // ===== 近7日访问量趋势（动态绘制） =====
                var history = stats.pageViewsHistory || [];
                var svgWidth = 320;
                var chartH = 140;
                // 数据点水平间隔
                var padding = 28; // 左右各留 28px 防止数值标签被截
                var topPad = 24;  // 顶部留 24px 给数值标签
                var btmPad = 20;  // 底部留 20px 给日期标签
                var usableW = svgWidth - padding * 2;
                var usableH = chartH - topPad - btmPad;
                var maxCount = 0;
                for (var hi = 0; hi < history.length; hi++) {
                    if (history[hi].count > maxCount) maxCount = history[hi].count;
                }
                if (maxCount === 0) maxCount = 1; // 防止除以 0

                // 生成点坐标
                var points = [];
                var total = history.length;
                for (var pi = 0; pi < total; pi++) {
                    var px = total > 1 ? padding + (pi / (total - 1)) * usableW : svgWidth / 2;
                    var py = topPad + usableH - ((history[pi].count / maxCount) * usableH);
                    points.push({ x: px, y: py, date: history[pi].date, count: history[pi].count });
                }

                if (total > 0) {
                    // 折线路径
                    var lineD = '';
                    for (var li = 0; li < points.length; li++) {
                        lineD += (li === 0 ? 'M' : 'L') + points[li].x.toFixed(1) + ',' + points[li].y.toFixed(1);
                    }
                    document.getElementById('linePath').setAttribute('d', lineD);

                    // 面积路径（折线 + 向下闭合到底部日期标签基线）
                    var baselineY = chartH - btmPad;
                    var areaD = lineD + ' L' + points[points.length - 1].x.toFixed(1) + ',' + baselineY +
                                ' L' + points[0].x.toFixed(1) + ',' + baselineY + ' Z';
                    document.getElementById('areaPath').setAttribute('d', areaD);

                    // 数据点 & 数值标签 & 日期标签
                    var dotsHtml = '';
                    var labelsHtml = '';
                    var datesHtml = '';
                    for (var di = 0; di < points.length; di++) {
                        var p = points[di];
                        var isLast = (di === points.length - 1);
                        var r = isLast ? 4 : 3;
                        var fill = isLast ? '#22c55e' : 'white';
                        dotsHtml += '<circle cx="' + p.x.toFixed(1) + '" cy="' + p.y.toFixed(1) + '" r="' + r + '" fill="' + fill + '" stroke="#22c55e" stroke-width="2"/>';
                        // 数值标签：显示在数据点上方
                        labelsHtml += '<text x="' + p.x.toFixed(1) + '" y="' + (p.y - 7).toFixed(1) + '" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="bold">' + fmt(p.count) + '</text>';
                        // 日期标签
                        var dateLabel = fmtDate(p.date);
                        if (isLast) dateLabel = '今日';
                        datesHtml += '<text x="' + p.x.toFixed(1) + '" y="' + (chartH - 4) + '" text-anchor="middle" fill="#94a3b8" font-size="9">' + dateLabel + '</text>';
                    }
                    document.getElementById('trendDots').innerHTML = dotsHtml;
                    document.getElementById('trendLabels').innerHTML = labelsHtml;
                    document.getElementById('dateLabels').innerHTML = datesHtml;

                    // 更新日期范围
                    var firstDate = fmtDate(points[0].date);
                    var lastDate = '今日';
                    document.getElementById('trendDateRange').textContent = firstDate + ' - ' + lastDate;
                }

                // ===== 功能模块使用占比 =====
                // 功能模块仅包含：查型号、看回收价、查看单位重量（不含页面访问）
                var cumQ = Number(stats.cumulativeModelQueries) || 0;
                var cumP = Number(stats.cumulativePriceViews) || 0;
                var cumU = Number(stats.cumulativeUnitWeightViews) || 0;
                var cumTotal = cumQ + cumP + cumU;
                if (cumTotal > 0) {
                    var pctQ = (cumQ / cumTotal * 100).toFixed(1);
                    var pctP = (cumP / cumTotal * 100).toFixed(1);
                    var pctU = (cumU / cumTotal * 100).toFixed(1);
                    // 更新文字百分比
                    var pctEls = document.querySelectorAll('.chart-aside .flex-1 .space-y-3 .flex.items-center.justify-between span.text-metal-800');
                    if (pctEls.length >= 3) {
                        pctEls[0].textContent = pctQ + '%';
                        pctEls[1].textContent = pctP + '%';
                        pctEls[2].textContent = pctU + '%';
                    }
                    // 更新圆环图
                    var circles = document.querySelectorAll('.chart-aside svg circle[stroke-dasharray]');
                    if (circles.length >= 3) {
                        var circumference = 2 * Math.PI * 52; // r=52
                        var offsets = [
                            0,
                            -(cumQ / cumTotal) * circumference,
                            -((cumQ + cumP) / cumTotal) * circumference
                        ];
                        var dasharrays = [
                            (cumQ / cumTotal) * circumference + ' ' + circumference,
                            (cumP / cumTotal) * circumference + ' ' + circumference,
                            (cumU / cumTotal) * circumference + ' ' + circumference
                        ];
                        for (var ci = 0; ci < 3; ci++) {
                            circles[ci].setAttribute('stroke-dasharray', dasharrays[ci]);
                            circles[ci].setAttribute('stroke-dashoffset', offsets[ci]);
                        }
                    }
                    // 更新总交互数
                    var totalText = document.querySelector('.chart-aside svg text[font-weight="bold"]');
                    if (totalText) totalText.textContent = fmt(cumTotal);
                }
            } catch (e) {
                // 统计数据加载失败，保持默认值
            }
        })();
    </script>
</body>
</html>
