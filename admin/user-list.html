<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>用户管理 - 铝老板管理后台</title>
    <script src="/lib/tailwind/tailwind.js"></script>
    <script src="/data/users.js"></script>
    <link href="/lib/fonts/fonts-admin-main.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: {
                colors: {
                    brand: { 50:'#f0fdf4',100:'#dcfce7',500:'#22c55e',600:'#16a34a',700:'#15803d' },
                    metal: { 50:'#f8fafc',100:'#f1f5f9',200:'#e2e8f0',300:'#cbd5e1',400:'#94a3b8',500:'#64748b',600:'#475569',700:'#334155',800:'#1e293b',900:'#0f172a' }
                },
                fontFamily: { sans: ['Noto Sans SC','system-ui','sans-serif'], mono: ['JetBrains Mono','monospace'] }
            } }
        }
    </script>
    <style>
        body { font-family: 'Noto Sans SC', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .tap-active:active { transform: scale(0.97); }
        .admin-app { min-height: 100vh; background: #f5f5f5; }
        .admin-sticky-header { position: sticky; top: 0; z-index: 40; background: #ffffff; }
        .admin-content { padding-bottom: 80px; }
        .content-inner { max-width: 1200px; margin: 0 auto; }
        .tab-scroll { scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
        .tab-item { scroll-snap-align: start; flex-shrink: 0; }
        .search-input { width: 100%; height: 38px; padding: 0 12px 0 36px; background: #f1f5f9; border-radius: 9999px; font-size: 13px; color: #0f172a; outline: none; border: 0; }
        .search-input:focus { background: #ffffff; box-shadow: 0 0 0 2px #22c55e; }
        @media (min-width: 1024px) {
            .admin-content { min-height: calc(100vh - 44px); padding-bottom: 72px; }
            .content-inner { padding: 0 24px; }
            .tab-scroll { justify-content: flex-start; }
        }
        /* 底部弹窗动画 */
        .sheet-overlay { animation: fadeIn .2s ease; }
        .sheet-panel  { animation: slideUp .25s ease; }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
    </style>
</head>
<body class="bg-gray-100">

<div class="admin-app">
    <header class="admin-sticky-header">
        <div id="admin-topbar"></div>
        <div class="bg-white border-b border-metal-100">
            <div class="tab-scroll flex overflow-x-auto scrollbar-hide px-4 lg:px-0" id="tab-bar">
                <button data-tab="all"  class="tab-item px-4 py-2.5 text-[13px] font-semibold text-brand-600 relative whitespace-nowrap tab-active-btn">
                    全部用户<div class="tab-indicator absolute bottom-0 left-4 right-4 h-[2.5px] bg-brand-500 rounded-full"></div>
                </button>
                <button data-tab="paid" class="tab-item px-4 py-2.5 text-[13px] text-metal-500 relative whitespace-nowrap">
                    付费用户
                </button>
                <button data-tab="free" class="tab-item px-4 py-2.5 text-[13px] text-metal-500 relative whitespace-nowrap">
                    非付费用户
                </button>
                <button data-tab="disabled" class="tab-item px-4 py-2.5 text-[13px] text-metal-500 relative whitespace-nowrap">
                    已禁用
                </button>
            </div>
        </div>
    </header>

    <main class="admin-content">
        <div class="content-inner px-4 lg:px-0">

            <!-- 搜索 -->
            <div class="mt-3 relative">
                <svg class="absolute left-3 top-1/2 -translate-y-1/2 text-metal-400" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                <input class="search-input" id="search-input" placeholder="搜索昵称 / 手机号">
            </div>

            <!-- 用户列表 -->
            <div class="mt-3 space-y-2" id="user-list"></div>
        </div>
    </main>

    <div id="admin-bottom-nav"></div>
</div>

<!-- 操作菜单（底部弹出） -->
<div id="action-sheet" class="fixed inset-0 z-[60] hidden">
    <div class="sheet-overlay absolute inset-0 bg-black/40" id="action-overlay"></div>
    <div class="sheet-panel absolute bottom-0 left-0 right-0 bg-white rounded-t-2xl p-2 pb-6">
        <div class="w-10 h-1 bg-metal-200 rounded-full mx-auto my-2"></div>
        <div class="px-4 py-3 border-b border-metal-100 mb-1">
            <p class="text-[12px] text-metal-400">操作</p>
            <p class="text-[15px] font-semibold text-metal-900" id="action-user-name">用户</p>
        </div>
        <button id="btn-edit" class="w-full text-left px-4 py-3.5 text-[14px] text-metal-800 active:bg-metal-50 rounded-xl flex items-center gap-3">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            编辑用户信息
        </button>
        <button id="btn-disable" class="w-full text-left px-4 py-3.5 text-[14px] text-rose-600 active:bg-rose-50 rounded-xl flex items-center gap-3">
            <svg id="disable-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg>
            <span id="disable-label">禁用该用户</span>
        </button>
        <button id="btn-action-cancel" class="w-full text-left px-4 py-3.5 text-[14px] text-metal-500 active:bg-metal-50 rounded-xl mt-2 text-center">取消</button>
    </div>
</div>

<!-- 编辑用户弹窗（底部弹出） -->
<div id="edit-sheet" class="fixed inset-0 z-[70] hidden">
    <div class="sheet-overlay absolute inset-0 bg-black/40" id="edit-overlay"></div>
    <div class="sheet-panel absolute bottom-0 left-0 right-0 bg-white rounded-t-2xl p-4 pb-8 max-h-[80vh] overflow-y-auto">
        <div class="w-10 h-1 bg-metal-200 rounded-full mx-auto my-1 mb-4"></div>
        <h3 class="text-[16px] font-bold text-metal-900 mb-4">编辑用户信息</h3>

        <div class="space-y-4">
            <!-- 昵称（只读） -->
            <div>
                <label class="block text-[12px] text-metal-500 mb-1">昵称</label>
                <input id="edit-name" class="w-full h-10 px-3 bg-metal-50 rounded-xl text-[14px] text-metal-700 border border-metal-200" readonly>
            </div>
            <!-- 手机号（只读） -->
            <div>
                <label class="block text-[12px] text-metal-500 mb-1">手机号</label>
                <input id="edit-phone" class="w-full h-10 px-3 bg-metal-50 rounded-xl text-[14px] text-metal-700 border border-metal-200" readonly>
            </div>
            <!-- 会员类型 -->
            <div>
                <label class="block text-[12px] text-metal-500 mb-1">会员类型</label>
                <select id="edit-vip" class="w-full h-10 px-3 bg-white rounded-xl text-[14px] text-metal-800 border border-metal-200 outline-none appearance-none">
                    <option value="无">无（普通用户）</option>
                    <option value="体验版">体验版（1天）</option>
                    <option value="全品类初级">全品类初级（30天）</option>
                    <option value="全品类高级 30 天">全品类高级 30 天</option>
                    <option value="全品类高级一年">全品类高级一年（365天）</option>
                    <option value="初级年会员">初级年会员（365天）</option>
                </select>
            </div>
            <!-- 到期时间 -->
            <div>
                <label class="block text-[12px] text-metal-500 mb-1">会员到期时间</label>
                <input id="edit-expire" type="date" class="w-full h-10 px-3 bg-white rounded-xl text-[14px] text-metal-800 border border-metal-200 outline-none">
            </div>
            <!-- 注册时间（只读） -->
            <div>
                <label class="block text-[12px] text-metal-500 mb-1">微信注册时间</label>
                <input id="edit-reg" class="w-full h-10 px-3 bg-metal-50 rounded-xl text-[14px] text-metal-700 border border-metal-200" readonly>
            </div>
        </div>

        <div class="flex gap-3 mt-6">
            <button id="btn-edit-cancel" class="flex-1 h-11 rounded-xl bg-metal-100 text-metal-600 text-[14px] font-medium tap-active">取消</button>
            <button id="btn-edit-save" class="flex-1 h-11 rounded-xl bg-brand-500 text-white text-[14px] font-semibold tap-active shadow-[0_4px_12px_rgba(34,197,94,0.3)]">保存修改</button>
        </div>
    </div>
</div>

<script type="module">
    import { mountAdminTopbar } from '/src/components/admin-topbar.js';
    import { mountAdminBottomNav } from '/src/components/admin-bottom-nav.js';

    mountAdminTopbar('#admin-topbar', {
        title: '用户管理',
        back: true,
        onMenu: () => openTopMenu(['批量导出', '刷新']),
        onAvatar: () => location.href = 'system.html',
    });
    mountAdminBottomNav('#admin-bottom-nav', { active: 'home' });

    // ── 渲染用户卡片 ─────────────────────────────────────
    function buildUserCard(user) {
        const card = document.createElement('div');
        card.className = 'user-card';
        card.dataset.paid = user.paid ? '1' : '0';
        card.dataset.name = user.name;
        card.dataset.phone = user.phone;
        card.dataset.disabled = user.disabled ? '1' : '0';

        const expireText = user.paid ? '会员到期：' + user.expire : '注册：' + user.regDate;
        const badgeColor = user.disabled
            ? 'bg-metal-100 text-metal-500'
            : user.paid ? 'bg-amber-50 text-amber-600' : 'bg-metal-100 text-metal-500';
        const badgeText = user.disabled ? '已禁用' : user.paid ? user.vip : '普通用户';
        const opacityClass = user.disabled ? ' opacity-50' : '';

        card.innerHTML = `
          <div class="block bg-white rounded-[14px] p-3 shadow-[0_2px_8px_rgba(0,0,0,0.03)]${opacityClass}">
            <div class="flex items-start gap-3">
              <div class="w-11 h-11 rounded-full bg-gradient-to-br ${user.avatarGradient} flex items-center justify-center text-white text-[16px] font-bold flex-shrink-0">${user.avatarChar}</div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 flex-wrap mb-1">
                  <span class="text-[14px] font-semibold text-metal-900">${user.name}</span>
                  <span class="px-1.5 py-0.5 ${badgeColor} text-[10px] rounded font-medium">${badgeText}</span>
                </div>
                <p class="text-[11px] text-metal-500">${maskPhone(user.phone)}</p>
                <p class="text-[10px] text-metal-400 mt-0.5">${expireText}</p>
              </div>
              <button class="more-btn text-metal-400 tap-active px-2"
                data-id="${user.id}"
                data-name="${user.name}"
                data-phone="${user.phone}"
                data-vip="${user.vip}"
                data-expire="${user.expire}"
                data-paid="${user.paid ? '1' : '0'}"
                data-disabled="${user.disabled ? '1' : '0'}">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="12" cy="5" r="1"/><circle cx="12" cy="19" r="1"/></svg>
              </button>
            </div>
          </div>`;
        return card;
    }

    function maskPhone(phone) {
        if (!phone || phone.length < 7) return phone || '';
        return phone.slice(0, 3) + '****' + phone.slice(-4);
    }

    function renderUserList(users) {
        const container = document.getElementById('user-list');
        container.innerHTML = '';
        users.forEach(function (u) {
            container.appendChild(buildUserCard(u));
        });
        bindMoreButtons();
    }

    // ── More 按钮事件绑定 ────────────────────────────────
    function bindMoreButtons() {
        document.querySelectorAll('.more-btn').forEach(function (btn) {
            btn.addEventListener('click', function (e) {
                e.stopPropagation();
                currentUserBtn = btn;
                currentUserId = btn.dataset.id;
                const isDisabled = btn.dataset.disabled === '1';
                actionUserName.textContent = btn.dataset.name;
                const disableBtn  = document.getElementById('btn-disable');
                const disableIcon = document.getElementById('disable-icon');
                const disableLbl  = document.getElementById('disable-label');
                if (isDisabled) {
                    disableLbl.textContent = '解除禁用';
                    disableBtn.classList.remove('text-rose-600', 'active:bg-rose-50');
                    disableBtn.classList.add('text-brand-600', 'active:bg-brand-50');
                    disableIcon.innerHTML = '<circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/>';
                } else {
                    disableLbl.textContent = '禁用该用户';
                    disableBtn.classList.add('text-rose-600', 'active:bg-rose-50');
                    disableBtn.classList.remove('text-brand-600', 'active:bg-brand-50');
                    disableIcon.innerHTML = '<circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>';
                }
                actionSheet.classList.remove('hidden');
            });
        });
    }

    // ── Tab 切换 ──────────────────────────────────────────
    const tabBar  = document.getElementById('tab-bar');
    let currentTab = 'all';

    tabBar.querySelectorAll('.tab-item').forEach(function (btn) {
        btn.addEventListener('click', function () {
            currentTab = btn.dataset.tab;
            tabBar.querySelectorAll('.tab-item').forEach(function (b) {
                b.classList.remove('font-semibold', 'text-brand-600', 'tab-active-btn');
                b.classList.add('text-metal-500');
                var ind = b.querySelector('.tab-indicator');
                if (ind) ind.remove();
            });
            btn.classList.add('font-semibold', 'text-brand-600', 'tab-active-btn');
            btn.classList.remove('text-metal-500');
            var indicator = document.createElement('div');
            indicator.className = 'tab-indicator absolute bottom-0 left-4 right-4 h-[2.5px] bg-brand-500 rounded-full';
            btn.appendChild(indicator);
            filterList();
        });
    });

    // ── 搜索 ────────────────────────────────────────────
    const searchInput = document.getElementById('search-input');
    searchInput.addEventListener('input', filterList);

    function filterList() {
        const q = searchInput.value.trim().toLowerCase();
        document.querySelectorAll('.user-card').forEach(function (card) {
            const name     = (card.dataset.name  || '').toLowerCase();
            const phone    = (card.dataset.phone || '').toLowerCase();
            const paid     = card.dataset.paid;
            const disabled = card.dataset.disabled === '1';
            let show = true;
            if (currentTab === 'disabled') {
                if (!disabled) show = false;
            } else {
                if (disabled) show = false;
                if (currentTab === 'paid' && paid !== '1') show = false;
                if (currentTab === 'free' && paid !== '0') show = false;
            }
            if (show && q) {
                show = name.includes(q) || phone.includes(q);
            }
            card.style.display = show ? '' : 'none';
        });
    }

    // ── 操作菜单 ─────────────────────────────────────────
    const actionSheet    = document.getElementById('action-sheet');
    const actionUserName = document.getElementById('action-user-name');
    let   currentUserBtn = null;
    let   currentUserId  = null;

    const closeAction = function () { actionSheet.classList.add('hidden'); };
    document.getElementById('action-overlay').addEventListener('click', closeAction);
    document.getElementById('btn-action-cancel').addEventListener('click', closeAction);

    // 禁用 / 解除禁用（同步 _AL_USERS）
    document.getElementById('btn-disable').addEventListener('click', function () {
        if (!currentUserBtn || !currentUserId) return;
        const card = currentUserBtn.closest('.user-card');
        if (!card) return;
        const isDisabled = currentUserBtn.dataset.disabled === '1';
        const name = currentUserBtn.dataset.name;

        if (confirm((isDisabled ? '确定要解除禁用用户「' : '确定要禁用用户「') + name + '」吗？')) {
            // 同步到数据层
            _AL_USERS.toggleDisabled(currentUserId);

            // 如果被禁用的是当前登录用户，登出其小程序会话
            if (isDisabled === false) { // 执行的是禁用操作（当前未禁用 → 点击后禁用）
                try {
                    var profileRaw2 = localStorage.getItem('_AL_USER_PROFILE');
                    if (profileRaw2) {
                        var profile2 = JSON.parse(profileRaw2);
                        if (profile2.isLoggedIn && (profile2.nickname === name || profile2._phone === currentUserBtn.dataset.phone)) {
                            localStorage.removeItem('_AL_USER_PROFILE');
                        }
                    }
                } catch (e) {}
            }

            // 更新 DOM
            const newDisabled = isDisabled ? '0' : '1';
            currentUserBtn.dataset.disabled = newDisabled;
            card.dataset.disabled = newDisabled;
            const block = card.querySelector('.block');
            const badge = card.querySelectorAll('span')[1];
            if (isDisabled) {
                block.classList.remove('opacity-50');
                const paid = currentUserBtn.dataset.paid;
                badge.className = paid === '1'
                    ? 'px-1.5 py-0.5 bg-amber-50 text-amber-600 text-[10px] rounded font-medium'
                    : 'px-1.5 py-0.5 bg-metal-100 text-metal-500 text-[10px] rounded font-medium';
                badge.textContent = paid === '1' ? currentUserBtn.dataset.vip : '普通用户';
            } else {
                block.classList.add('opacity-50');
                badge.className = 'px-1.5 py-0.5 bg-metal-100 text-metal-500 text-[10px] rounded font-medium';
                badge.textContent = '已禁用';
            }
            filterList();
        }
        closeAction();
    });

    // 编辑 → 打开编辑弹窗
    const editSheet   = document.getElementById('edit-sheet');
    const editName    = document.getElementById('edit-name');
    const editPhone   = document.getElementById('edit-phone');
    const editVip     = document.getElementById('edit-vip');
    const editExpire  = document.getElementById('edit-expire');
    const editReg     = document.getElementById('edit-reg');

    document.getElementById('btn-edit').addEventListener('click', function () {
        if (!currentUserBtn) return;
        const d = currentUserBtn.dataset;
        editName.value   = d.name;
        editPhone.value  = d.phone;
        const vipMap = { '年卡':'年卡', '季卡':'季卡', '月卡':'月卡', '永久':'永久', '体验版':'体验版', '全品类初级':'全品类初级', '全品类高级 30 天':'全品类高级 30 天', '全品类高级一年':'全品类高级一年', '初级年会员':'初级年会员', '无':'无' };
        editVip.value    = vipMap[d.vip] || '无';
        editExpire.value = d.expire && d.expire !== '-' ? d.expire : '';
        editReg.value    = '2026-01-15';
        closeAction();
        editSheet.classList.remove('hidden');
    });

    const closeEdit = function () { editSheet.classList.add('hidden'); };
    document.getElementById('edit-overlay').addEventListener('click', closeEdit);
    document.getElementById('btn-edit-cancel').addEventListener('click', closeEdit);

    // 编辑保存（同步 _AL_USERS）
    document.getElementById('btn-edit-save').addEventListener('click', function () {
        if (!currentUserBtn || !currentUserId) return;
        const d = currentUserBtn.dataset;
        d.vip    = editVip.value === '无' ? '无' : editVip.value;
        d.expire = editExpire.value || '-';
        d.paid   = editVip.value === '无' ? '0' : '1';

        // 同步到数据层
        _AL_USERS.update(currentUserId, {
            vip: d.vip,
            expire: d.expire,
            paid: editVip.value !== '无'
        });

        // 如果编辑的用户与当前小程序登录用户匹配，同步更新 _AL_USER_PROFILE
        var userProfile = null;
        try {
            var profileRaw = localStorage.getItem('_AL_USER_PROFILE');
            if (profileRaw) userProfile = JSON.parse(profileRaw);
        } catch (e) {}
        if (userProfile && userProfile.isLoggedIn) {
            var matched = userProfile.nickname === d.name || userProfile._phone === d.phone;
            if (matched) {
                var pkgMap = { '体验版': 'trial', '全品类初级': 'basic', '全品类高级 30 天': 'std30', '全品类高级一年': 'std1y', '初级年会员': 'basic1y' };
                userProfile.isMember = editVip.value !== '无';
                userProfile.memberPackage = pkgMap[d.vip] || '';
                userProfile.memberPackageName = d.vip || '';
                if (editVip.value !== '无' && d.expire && d.expire !== '-') {
                    var expireDate = new Date(d.expire);
                    userProfile.memberExpireAt = expireDate.getTime() + 24 * 60 * 60 * 1000;
                } else {
                    userProfile.memberExpireAt = 0;
                }
                localStorage.setItem('_AL_USER_PROFILE', JSON.stringify(userProfile));
            }
        }

        // 更新 DOM
        const card = currentUserBtn.closest('.user-card');
        card.dataset.paid = d.paid;
        const vipLabel = card.querySelectorAll('span')[1];
        if (d.paid === '1') {
            vipLabel.className = 'px-1.5 py-0.5 bg-amber-50 text-amber-600 text-[10px] rounded font-medium';
            vipLabel.textContent = d.vip;
        } else {
            vipLabel.className = 'px-1.5 py-0.5 bg-metal-100 text-metal-500 text-[10px] rounded font-medium';
            vipLabel.textContent = '普通用户';
        }
        const expireP = card.querySelector('p:last-of-type');
        expireP.textContent = d.paid === '1' ? '会员到期：' + d.expire : '注册：' + editReg.value;

        alert('保存成功');
        closeEdit();
    });

    // ── 右上角菜单 ────────────────────────────────────────
    function openTopMenu(items) {
        const existing = document.getElementById('__top_menu__');
        if (existing) existing.remove();
        const menu = document.createElement('div');
        menu.id = '__top_menu__';
        menu.className = 'fixed inset-0 z-[60] flex items-end justify-center';
        menu.innerHTML = ' \n          <div class="absolute inset-0 bg-black/40" data-close></div>\n          <div class="relative w-full bg-white rounded-t-2xl p-2 pb-6 sheet-panel">\n            <div class="w-10 h-1 bg-metal-200 rounded-full mx-auto my-2"></div>\n            ' + items.map(function (t) { return '<button class="w-full text-left px-4 py-3.5 text-[14px] text-metal-800 active:bg-metal-50 rounded-xl">' + t + '</button>'; }).join('') + '\n            <button class="w-full text-left px-4 py-3.5 text-[14px] text-metal-500 active:bg-metal-50 rounded-xl mt-2" data-close>取消</button>\n          </div>';
        document.body.appendChild(menu);
        menu.querySelectorAll('[data-close]').forEach(function (el) { el.addEventListener('click', function () { menu.remove(); }); });
    }

    // ── 初始化：从数据层渲染用户列表 ─────────────────────
    renderUserList(_AL_USERS.getAll());
</script>
