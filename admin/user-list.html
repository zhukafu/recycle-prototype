<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>用户管理 - 铝老板管理后台</title>
    <script src="/lib/tailwind/tailwind.js"></script>
    <link href="/lib/fonts/fonts-admin-main.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: {
                colors: {
                    brand: { 50:'#f0fdf4',100:'#dcfce7',500:'#22c55e',600:'#16a34a',700:'#15803d' },
                    metal: { 50:'#f8fafc',100:'#f1f5f9',200:'#e2e8f0',300:'#cbd5e1',400:'#94a3b8',500:'#64748b',600:'#475569',700:'#334155',800:'#1e293b',900:'#0f172a' }
                },
                fontFamily: { sans: ['Noto Sans SC','system-ui','sans-serif'], mono: ['JetBrains Mono','monospace'] }
            } }
        }
    </script>
    <style>
        body { font-family: 'Noto Sans SC', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .tap-active:active { transform: scale(0.97); }
        .admin-app { min-height: 100vh; background: #f5f5f5; }
        .admin-sticky-header { position: sticky; top: 0; z-index: 40; background: #ffffff; }
        .admin-content { padding-bottom: 80px; }
        .content-inner { max-width: 1200px; margin: 0 auto; }
        .tab-scroll { scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
        .tab-item { scroll-snap-align: start; flex-shrink: 0; }
        .search-input { width: 100%; height: 38px; padding: 0 12px 0 36px; background: #f1f5f9; border-radius: 9999px; font-size: 13px; color: #0f172a; outline: none; border: 0; }
        .search-input:focus { background: #ffffff; box-shadow: 0 0 0 2px #22c55e; }
        @media (min-width: 1024px) {
            .admin-content { min-height: calc(100vh - 44px); padding-bottom: 72px; }
            .content-inner { padding: 0 24px; }
            .tab-scroll { justify-content: flex-start; }
        }
        /* 底部弹窗动画 */
        .sheet-overlay { animation: fadeIn .2s ease; }
        .sheet-panel  { animation: slideUp .25s ease; }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
        @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
    </style>
</head>

</div>

<!-- 编辑用户弹窗（底部弹出） -->
<div id="edit-sheet" class="fixed inset-0 z-[70] hidden">

    <div class="sheet-panel absolute bottom-0 left-0 right-0 bg-white rounded-t-2xl p-4 pb-8 max-h-[80vh] overflow-y-auto">

                <label class="block text-[12px] text-metal-500 mb-1">会员类型</label>

                <label class="block text-[12px] text-metal-500 mb-1">微信注册时间</label>

        <div class="flex gap-3 mt-6">
            <button id="btn-edit-cancel" class="flex-1 h-11 rounded-xl bg-metal-100 text-metal-600 text-[14px] font-medium tap-active">取消</button>
            <button id="btn-edit-save" class="flex-1 h-11 rounded-xl bg-brand-500 text-white text-[14px] font-semibold tap-active shadow-[0_4px_12px_rgba(34,197,94,0.3)]">保存修改</button>
        </div>
    </div>
</div>

<script type="module">
    import { mountAdminTopbar } from '/src/components/admin-topbar.js';
    import { mountAdminBottomNav } from '/src/components/admin-bottom-nav.js';

    mountAdminTopbar('#admin-topbar', {
        title: '用户管理',
        back: true,
        onMenu: () => openTopMenu(['批量导出', '刷新']),
        onAvatar: () => location.href = 'system.html',
    });
    mountAdminBottomNav('#admin-bottom-nav', { active: 'home' });

    // ── Tab 切换 ──────────────────────────────────────────
    const tabBar  = document.getElementById('tab-bar');
    const allCards = () => document.querySelectorAll('.user-card');
    let currentTab = 'all';

    tabBar.querySelectorAll('.tab-item').forEach(btn => {
        btn.addEventListener('click', () => {
            currentTab = btn.dataset.tab;
            // 高亮
            tabBar.querySelectorAll('.tab-item').forEach(b => {
                b.classList.remove('font-semibold','text-brand-600','tab-active-btn');
                b.classList.add('text-metal-500');
                const ind = b.querySelector('.tab-indicator');
                if (ind) ind.remove();
            });
            btn.classList.add('font-semibold','text-brand-600','tab-active-btn');
            btn.classList.remove('text-metal-500');
            const indicator = document.createElement('div');
            indicator.className = 'tab-indicator absolute bottom-0 left-4 right-4 h-[2.5px] bg-brand-500 rounded-full';
            btn.appendChild(indicator);
            filterList();
        });
    });

    // ── 搜索 ────────────────────────────────────────────
    const searchInput = document.getElementById('search-input');
    searchInput.addEventListener('input', filterList);

    function filterList() {
        const q = searchInput.value.trim().toLowerCase();
        allCards().forEach(card => {
            const name     = (card.dataset.name  || '').toLowerCase();
            const phone    = (card.dataset.phone || '').toLowerCase();
            const paid     = card.dataset.paid;
            const disabled = card.dataset.disabled === '1';
            let show = true;
            // tab 过滤：非"已禁用"tab 时，隐藏已禁用用户；"已禁用"tab 只显示已禁用
            if (currentTab === 'disabled') {
                if (!disabled) show = false;
            } else {
                if (disabled) show = false;
                if (currentTab === 'paid' && paid !== '1') show = false;
                if (currentTab === 'free' && paid !== '0') show = false;
            }
            // 搜索过滤（昵称 or 手机号）
            if (show && q) {
                show = name.includes(q) || phone.includes(q);
            }
            card.style.display = show ? '' : 'none';
        });
    }

    // ── 操作菜单 ─────────────────────────────────────────
    const actionSheet    = document.getElementById('action-sheet');
    const actionUserName = document.getElementById('action-user-name');
    let   currentUserBtn = null;

    document.querySelectorAll('.more-btn').forEach(btn => {
        btn.addEventListener('click', e => {
            e.stopPropagation();
            currentUserBtn = btn;
            const isDisabled = btn.dataset.disabled === '1';
            actionUserName.textContent = btn.dataset.name;
            // 动态切换禁用/解除禁用按钮文案和颜色
            const disableBtn  = document.getElementById('btn-disable');
            const disableIcon = document.getElementById('disable-icon');
            const disableLbl  = document.getElementById('disable-label');
            if (isDisabled) {
                disableLbl.textContent = '解除禁用';
                disableBtn.classList.remove('text-rose-600','active:bg-rose-50');
                disableBtn.classList.add('text-brand-600','active:bg-brand-50');
                disableIcon.innerHTML = '<circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/>';
            } else {
                disableLbl.textContent = '禁用该用户';
                disableBtn.classList.add('text-rose-600','active:bg-rose-50');
                disableBtn.classList.remove('text-brand-600','active:bg-brand-50');
                disableIcon.innerHTML = '<circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/>';
            }
            actionSheet.classList.remove('hidden');
        });
    });

    const closeAction = () => actionSheet.classList.add('hidden');
    document.getElementById('action-overlay').addEventListener('click', closeAction);
    document.getElementById('btn-action-cancel').addEventListener('click', closeAction);

    // 禁用 / 解除禁用
    document.getElementById('btn-disable').addEventListener('click', () => {
        if (!currentUserBtn) return;
        const card = currentUserBtn.closest('.user-card');
        if (!card) return;
        const isDisabled = currentUserBtn.dataset.disabled === '1';
        const name = currentUserBtn.dataset.name;
        if (isDisabled) {
            // 解除禁用
            if (confirm(`确定要解除禁用用户「${name}」吗？`)) {
                currentUserBtn.dataset.disabled = '0';
                card.dataset.disabled = '0';
                card.querySelector('.block').classList.remove('opacity-50');
                // 移除已禁用 badge，恢复普通 badge
                const badge = card.querySelectorAll('span')[1];
                const paid  = currentUserBtn.dataset.paid;
                if (paid === '1') {
                    badge.className = 'px-1.5 py-0.5 bg-amber-50 text-amber-600 text-[10px] rounded font-medium';
                    badge.textContent = 'VIP' + currentUserBtn.dataset.vip;
                } else {
                    badge.className = 'px-1.5 py-0.5 bg-metal-100 text-metal-500 text-[10px] rounded font-medium';
                    badge.textContent = '普通用户';
                }
                alert(`用户「${name}」已解除禁用`);
                filterList();
            }
        } else {
            // 禁用
            if (confirm(`确定要禁用用户「${name}」吗？`)) {
                currentUserBtn.dataset.disabled = '1';
                card.dataset.disabled = '1';
                card.querySelector('.block').classList.add('opacity-50');
                const badge = card.querySelectorAll('span')[1];
                badge.className = 'px-1.5 py-0.5 bg-metal-100 text-metal-500 text-[10px] rounded font-medium';
                badge.textContent = '已禁用';
                alert(`用户「${name}」已被禁用`);
                filterList();
            }
        }
        closeAction();
    });

    // 编辑 → 打开编辑弹窗
    const editSheet   = document.getElementById('edit-sheet');
    const editName    = document.getElementById('edit-name');
    const editPhone   = document.getElementById('edit-phone');
    const editVip     = document.getElementById('edit-vip');
    const editExpire  = document.getElementById('edit-expire');
    const editReg     = document.getElementById('edit-reg');

    document.getElementById('btn-edit').addEventListener('click', () => {
        if (!currentUserBtn) return;
        const d    = currentUserBtn.dataset;
        const card = currentUserBtn.closest('.user-card');
        editName.value   = d.name;
        editPhone.value  = d.phone;
        // 为所有 user-card 补充 data-disabled（如果缺失）
        if (card && !card.dataset.disabled) card.dataset.disabled = '0';
        const vipMap = { '年卡':'年卡', '季卡':'季卡', '月卡':'月卡', '永久':'永久', '体验版':'体验版', '全品类初级':'全品类初级', '全品类高级 30 天':'全品类高级 30 天', '全品类高级一年':'全品类高级一年', '初级年会员':'初级年会员', '无':'无' };
        editVip.value    = vipMap[d.vip] || '无';
        editExpire.value = d.expire && d.expire !== '-' ? d.expire : '';
        editReg.value    = '2026-01-15'; // 示例固定
        closeAction();
        editSheet.classList.remove('hidden');
    });

    const closeEdit = () => editSheet.classList.add('hidden');
    document.getElementById('edit-overlay').addEventListener('click', closeEdit);
    document.getElementById('btn-edit-cancel').addEventListener('click', closeEdit);

    document.getElementById('btn-edit-save').addEventListener('click', () => {
        if (!currentUserBtn) return;
        const d = currentUserBtn.dataset;
        d.vip    = editVip.value === '无' ? '无' : editVip.value;
        d.expire = editExpire.value || '-';
        d.paid   = editVip.value === '无' ? '0' : '1';

        // 更新卡片显示
        const card = currentUserBtn.closest('.user-card');
        card.dataset.paid = d.paid;
        const vipLabel = card.querySelectorAll('span')[1]; // VIP badge span
        if (d.paid === '1') {
            vipLabel.className = 'px-1.5 py-0.5 bg-amber-50 text-amber-600 text-[10px] rounded font-medium';
            vipLabel.textContent = 'VIP' + d.vip;
        } else {
            vipLabel.className = 'px-1.5 py-0.5 bg-metal-100 text-metal-500 text-[10px] rounded font-medium';
            vipLabel.textContent = '普通用户';
        }
        const expireP = card.querySelector('p:last-of-type');
        if (d.paid === '1') {
            expireP.textContent = '会员到期：' + d.expire;
        } else {
            expireP.textContent = '注册：' + editReg.value;
        }

        alert('保存成功');
        closeEdit();
    });

    // ── 右上角菜单 ────────────────────────────────────────
    function openTopMenu(items) {
        const existing = document.getElementById('__top_menu__');
        if (existing) existing.remove();
        const menu = document.createElement('div');
        menu.id = '__top_menu__';
        menu.className = 'fixed inset-0 z-[60] flex items-end justify-center';
        menu.innerHTML = `
          <div class="absolute inset-0 bg-black/40" data-close></div>
          <div class="relative w-full bg-white rounded-t-2xl p-2 pb-6 sheet-panel">
            <div class="w-10 h-1 bg-metal-200 rounded-full mx-auto my-2"></div>
            ${items.map(t => `<button class="w-full text-left px-4 py-3.5 text-[14px] text-metal-800 active:bg-metal-50 rounded-xl">${t}</button>`).join('')}
            <button class="w-full text-left px-4 py-3.5 text-[14px] text-metal-500 active:bg-metal-50 rounded-xl mt-2" data-close>取消</button>
          </div>`;
        document.body.appendChild(menu);
        menu.querySelectorAll('[data-close]').forEach(el => el.addEventListener('click', () => menu.remove()));
    }
</script>

</body>
</html>
