<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>询价详情 - 铝老板管理后台</title>
    <script src="/lib/tailwind/tailwind.js"></script>
    <link href="/lib/fonts/fonts-admin-main.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: {
                colors: {
                    brand: { 50:'#f0fdf4',100:'#dcfce7',200:'#bbf7d0',500:'#22c55e',600:'#16a34a',700:'#15803d' },
                    metal: { 50:'#f8fafc',100:'#f1f5f9',200:'#e2e8f0',300:'#cbd5e1',400:'#94a3b8',500:'#64748b',600:'#475569',700:'#334155',800:'#1e293b',900:'#0f172a' }
                },
                fontFamily: { sans: ['Noto Sans SC','system-ui','sans-serif'], mono: ['JetBrains Mono','monospace'] }
            } }
        }
    </script>
    <style>
        body { font-family: 'Noto Sans SC', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        .admin-app { min-height: 100vh; background: #f5f5f5; }
        .admin-sticky-header { position: sticky; top: 0; z-index: 40; background: #ffffff; }
        .admin-content { padding-bottom: 100px; }
        .content-inner { max-width: 1200px; margin: 0 auto; }
        .field-label { display: block; font-size: 11px; color: #94a3b8; margin-bottom: 2px; }
        .timeline-dot { width: 10px; height: 10px; border-radius: 9999px; background: #22c55e; box-shadow: 0 0 0 3px #dcfce7; }
        .timeline-dot.muted { background: #cbd5e1; box-shadow: 0 0 0 3px #f1f5f9; }
        @media (min-width: 1024px) {
            .admin-content { min-height: calc(100vh - 44px); padding-bottom: 88px; }
            .content-inner { padding: 0 24px; }
        }
    </style>
</head>
<body class="bg-gray-100">

<div class="admin-app">
    <header class="admin-sticky-header">
        <div id="admin-topbar"></div>
    </header>

    <main class="admin-content">
        <div class="content-inner px-4 lg:px-0 py-4 space-y-3">

            <!-- 状态卡 -->
            <section class="bg-gradient-to-br from-rose-400 to-rose-500 rounded-[16px] p-4 text-white shadow-[0_4px_16px_rgba(244,63,94,0.25)]">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-[11px] opacity-85">询价单号</p>
                        <p class="text-[20px] font-black font-mono leading-tight mt-1">#INQ-20250609-0078</p>
                        <p class="text-[11px] opacity-80 mt-1">2025-06-09 14:32 提交</p>
                    </div>
                    <div class="px-3 py-1.5 bg-white/25 backdrop-blur-sm rounded-full text-[12px] font-semibold">
                        待处理
                    </div>
                </div>
            </section>

            <!-- 客户信息 -->
            <section class="bg-white rounded-[14px] p-4 shadow-[0_2px_8px_rgba(0,0,0,0.03)]">
                <h3 class="text-[14px] font-bold text-metal-900 mb-3">客户信息</h3>
                <div class="flex items-center gap-3 mb-3">
                    <div class="w-12 h-12 rounded-full bg-purple-50 flex items-center justify-center text-purple-600 text-[18px] font-bold">陈</div>
                    <div class="flex-1">
                        <div class="flex items-center gap-2">
                            <h4 class="text-[15px] font-bold text-metal-900">陈老板</h4>
                            <span class="px-1.5 py-0.5 bg-amber-50 text-amber-600 text-[10px] rounded">金牌回收商</span>
                        </div>
                        <p class="text-[12px] text-metal-500 mt-0.5">浙江 杭州 · 累计询价 23 次</p>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3 pt-3 border-t border-metal-100">
                    <div>
                        <p class="field-label">联系电话</p>
                        <p class="text-[13px] text-metal-800 font-mono">138 1234 5678</p>
                    </div>
                    <div>
                        <p class="field-label">微信号</p>
                        <p class="text-[13px] text-metal-800 font-mono">chen_laoban</p>
                    </div>
                </div>
                <div class="flex gap-2 mt-3">
                    <button class="flex-1 h-9 rounded-full bg-brand-50 text-brand-600 text-[12px] font-semibold flex items-center justify-center gap-1 tap-active">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.37 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.33 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                        拨打电话
                    </button>
                    <button class="flex-1 h-9 rounded-full bg-blue-50 text-blue-600 text-[12px] font-semibold flex items-center justify-center gap-1 tap-active">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                        微信联系
                    </button>
                </div>
            </section>

            <!-- 询价详情 -->
            <section class="bg-white rounded-[14px] p-4 shadow-[0_2px_8px_rgba(0,0,0,0.03)]">
                <h3 class="text-[14px] font-bold text-metal-900 mb-3">询价详情</h3>
                <div class="space-y-3">
                    <div>
                        <p class="field-label">询价内容</p>
                        <p class="text-[13px] text-metal-800">求购 CJX2 系列银触点 200kg，要求纯度 90% 以上，可分批供货，价格可议。需要商家提供检测报告。</p>
                    </div>
                    <div class="grid grid-cols-3 gap-3">
                        <div>
                            <p class="field-label">数量</p>
                            <p class="text-[14px] font-bold text-metal-900 font-mono">200 kg</p>
                        </div>
                        <div>
                            <p class="field-label">期望单价</p>
                            <p class="text-[14px] font-bold text-metal-900 font-mono">¥7.5/g</p>
                        </div>
                        <div>
                            <p class="field-label">紧急程度</p>
                            <p class="text-[14px] font-bold text-rose-600">紧急</p>
                        </div>
                    </div>
                    <div>
                        <p class="field-label">上传图片（3张）</p>
                        <div class="grid grid-cols-3 gap-2 mt-1">
                            <div class="aspect-square rounded-[10px] bg-gradient-to-br from-metal-100 to-metal-200 overflow-hidden">
                                <img src="/交流接触器CJX2-1210.jpg" class="w-full h-full object-cover" alt="">
                            </div>
                            <div class="aspect-square rounded-[10px] bg-gradient-to-br from-metal-200 to-metal-300 flex items-center justify-center text-3xl">📦</div>
                            <div class="aspect-square rounded-[10px] bg-gradient-to-br from-metal-200 to-metal-300 flex items-center justify-center text-3xl">📋</div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 跟进记录 -->
            <section class="bg-white rounded-[14px] p-4 shadow-[0_2px_8px_rgba(0,0,0,0.03)]">
                <h3 class="text-[14px] font-bold text-metal-900 mb-3">跟进记录</h3>
                <div class="space-y-3 relative pl-4">
                    <div class="absolute left-[5px] top-2 bottom-2 w-px bg-metal-200"></div>
                    <div class="flex items-start gap-3 relative">
                        <div class="timeline-dot muted absolute -left-4 mt-1.5"></div>
                        <div class="flex-1">
                            <p class="text-[12px] text-metal-800">客户提交询价单</p>
                            <p class="text-[10px] text-metal-400 mt-0.5">2025-06-09 14:32 · 系统</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 备注 -->
            <section class="bg-white rounded-[14px] p-4 shadow-[0_2px_8px_rgba(0,0,0,0.03)]">
                <h3 class="text-[14px] font-bold text-metal-900 mb-3">处理备注</h3>
                <textarea class="w-full bg-metal-50 rounded-[10px] p-3 text-[13px] text-metal-800 outline-none border-0 focus:bg-white focus:shadow-[0_0_0_2px_#22c55e]" rows="3" placeholder="请输入处理备注..."></textarea>
            </section>

            <!-- 操作 -->
            <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-metal-100 p-3 z-30 lg:sticky lg:bottom-0">
                <div class="content-inner flex gap-2 px-0 lg:px-0">
                    <button class="h-11 px-4 rounded-full bg-metal-100 text-metal-700 text-[13px] font-semibold tap-active">转单</button>
                    <button class="h-11 px-4 rounded-full bg-rose-50 text-rose-600 text-[13px] font-semibold tap-active">关闭</button>
                    <button class="flex-1 h-11 rounded-full bg-amber-500 text-white text-[14px] font-semibold tap-active">报价</button>
                    <button class="flex-1 h-11 rounded-full bg-brand-500 text-white text-[14px] font-semibold tap-active shadow-[0_4px_12px_rgba(34,197,94,0.25)]">标记处理中</button>
                </div>
            </div>
        </div>
    </main>

    <div id="admin-bottom-nav"></div>
</div>

<script type="module">
    import { mountAdminTopbar } from '/src/components/admin-topbar.js';
    import { mountAdminBottomNav } from '/src/components/admin-bottom-nav.js';

    mountAdminTopbar('#admin-topbar', {
        title: '询价详情',
        back: true,
        onMenu: () => openActionMenu(['打印', '转发', '客户档案', '刷新']),
        onAvatar: () => location.href = 'mine.html',
    });
    mountAdminBottomNav('#admin-bottom-nav', { active: 'home' });

    function openActionMenu(items) {
        const existing = document.getElementById('__action_menu__');
        if (existing) existing.remove();
        const menu = document.createElement('div');
        menu.id = '__action_menu__';
        menu.className = 'fixed inset-0 z-[60] flex items-end justify-center';
        menu.innerHTML = `
          <div class="absolute inset-0 bg-black/40" data-close></div>
          <div class="relative w-full bg-white rounded-t-2xl p-2 pb-6 animate-up">
            <div class="w-10 h-1 bg-metal-200 rounded-full mx-auto my-2"></div>
            ${items.map(t => `<button class="w-full text-left px-4 py-3.5 text-[14px] text-metal-800 active:bg-metal-50 rounded-xl">${t}</button>`).join('')}
            <button class="w-full text-left px-4 py-3.5 text-[14px] text-rose-600 font-medium active:bg-metal-50 rounded-xl mt-2" data-close>取消</button>
          </div>`;
        document.body.appendChild(menu);
        menu.querySelectorAll('[data-close]').forEach(el => el.addEventListener('click', () => menu.remove()));
    }
</script>

</body>
</html>
