<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>型号详情 - 铝老板管理后台</title>
    <script src="/data/contacts.js"></script>
    <script src="/data/categories.js"></script>
    <script src="/lib/tailwind/tailwind.js"></script>
    <link href="/lib/fonts/fonts-admin-main.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: {
                colors: {
                    brand: { 50:'#f0fdf4',100:'#dcfce7',200:'#bbf7d0',300:'#86efac',400:'#4ade80',500:'#22c55e',600:'#16a34a',700:'#15803d' },
                    metal: { 50:'#f8fafc',100:'#f1f5f9',200:'#e2e8f0',300:'#cbd5e1',400:'#94a3b8',500:'#64748b',600:'#475569',700:'#334155',800:'#1e293b',900:'#0f172a' },
                    amber: { 50:'#fffbeb',100:'#fef3c7',500:'#f59e0b',600:'#d97706',700:'#b45309',800:'#92400e' }
                },
                fontFamily: { sans: ['Noto Sans SC','system-ui','sans-serif'], mono: ['JetBrains Mono','monospace'] }
            } }
        }
    </script>
    <style>
        body { font-family: 'Noto Sans SC', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        .admin-app { min-height: 100vh; background: #f5f5f5; }
        .admin-sticky-header { position: sticky; top: 0; z-index: 40; background: #ffffff; }
        .admin-content { padding-bottom: 160px; }
        .content-inner { max-width: 1200px; margin: 0 auto; }
        @media (min-width: 1024px) {
            .admin-content { min-height: calc(100vh - 44px); padding-bottom: 140px; }
            .content-inner { padding: 0 24px; }
        }
        
        /* 富文本样式 */
        #descEl h2 { font-size: 16px; font-weight: 700; margin: 12px 0 8px; color: #0f172a; }
        #descEl h3 { font-size: 14px; font-weight: 700; margin: 10px 0 6px; color: #1e293b; }
        #descEl p { margin: 0 0 8px; }
        #descEl strong { font-weight: 700; color: #0f172a; }
        #descEl em { font-style: italic; }
        #descEl blockquote {
            margin: 8px 0; padding: 8px 12px; border-left: 3px solid #22c55e;
            background: #f0fdf4; border-radius: 0 6px 6px 0; color: #334155;
        }
        #descEl ul, #descEl ol { margin: 6px 0; padding-left: 20px; }
        #descEl li { margin-bottom: 4px; }
        #descEl ul li { list-style-type: disc; }
        #descEl ol li { list-style-type: decimal; }
        #descEl a { color: #16a34a; text-decoration: underline; }
        #descEl img { max-width: 100%; border-radius: 6px; margin: 6px 0; display: block; }
        #descEl hr { border: none; border-top: 1px solid #e2e8f0; margin: 10px 0; }
    </style>
</head>
<body class="bg-gray-100">

<div class="admin-app">
    <header class="admin-sticky-header">
        <div id="admin-topbar"></div>
    </header>

    <!-- 加载中 -->
    <div id="loading" class="px-4 py-16 text-center">
        <div class="inline-flex items-center gap-1 text-metal-400 text-sm">
            <span class="w-1.5 h-1.5 rounded-full bg-brand-500 animate-pulse"></span>
            <span class="w-1.5 h-1.5 rounded-full bg-brand-500 animate-pulse" style="animation-delay:.2s"></span>
            <span class="w-1.5 h-1.5 rounded-full bg-brand-500 animate-pulse" style="animation-delay:.4s"></span>
            <span class="ml-2">加载中...</span>
        </div>
    </div>

    <!-- 找不到 -->
    <div id="notFound" class="px-4 py-16 text-center hidden">
        <div class="w-20 h-20 bg-metal-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-10 h-10 text-metal-300" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9.879 7.519c1.171-1.025 3.071-1.025 4.242 0 1.172 1.025 1.172 2.687 0 3.712-.203.179-.43.326-.67.442-.745.361-1.45.999-1.45 1.827v.75M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9 5.25h.008v.008H12v-.008z"></path>
            </svg>
        </div>
        <p class="text-metal-900 font-bold text-base">未找到该型号</p>
        <a href="catalog-list.html" class="inline-block mt-4 text-brand-600 font-semibold text-sm">返回型号管理 →</a>
    </div>

    <!-- 主内容 -->
    <main id="mainContent" class="admin-content hidden">
        <div class="content-inner">

            <!-- 产品图片 -->
            <div class="bg-white">
                <div class="relative h-[260px] flex items-center justify-center bg-metal-50">
                    <img id="productImg" src="" class="object-cover w-full h-full" alt="">
                    <div id="imgFallback" class="absolute inset-0 flex items-center justify-center text-3xl font-black opacity-10 text-metal-500"></div>
                </div>
            </div>

            <!-- 基本信息 -->
            <div class="bg-white px-4 py-4 mt-2">
                <div class="flex items-start justify-between gap-3">
                    <h2 class="text-[18px] font-bold text-metal-900" id="modelName">--</h2>
                    <span class="shrink-0 bg-brand-50 text-brand-700 text-[11px] px-2 py-1 rounded-md font-medium" id="brandBadge">--</span>
                </div>
                <p class="text-[12px] text-metal-500 mt-1" id="brandSpec">--</p>
                <div class="mt-3 space-y-1.5">
                    <div class="flex items-baseline gap-2">
                        <span class="text-[12px] text-metal-500">回收价：</span>
                        <span class="text-[18px] font-bold text-amber-600 font-mono" id="priceEl">--</span>
                    </div>
                    <div class="flex items-baseline gap-2">
                        <span class="text-[12px] text-metal-500">银点铜回收价：</span>
                        <span class="text-[14px] font-bold text-metal-800 font-mono" id="silverCopperEl">--</span>
                    </div>
                </div>
            </div>

            <!-- 关键参数 -->
            <div class="mx-4 lg:mx-0 mt-3 bg-white rounded-[14px] p-4 shadow-[0_2px_8px_rgba(0,0,0,0.03)]">
                <div class="flex items-center gap-2 mb-3">
                    <div class="w-1 h-4 bg-brand-500 rounded-full"></div>
                    <h3 class="text-[14px] font-semibold text-metal-900">关键参数</h3>
                </div>
                <div class="grid grid-cols-3 gap-2" id="paramGrid"></div>
            </div>

            <!-- 单位重量表 -->
            <div class="mx-4 lg:mx-0 mt-3 bg-white rounded-[14px] overflow-hidden shadow-[0_2px_8px_rgba(0,0,0,0.03)]">
                <div class="flex items-center gap-2 px-4 py-3 border-b border-metal-50">
                    <div class="w-1 h-4 bg-brand-500 rounded-full"></div>
                    <h3 class="text-[14px] font-semibold text-metal-900">单位重量</h3>
                    <span class="text-[10px] text-metal-400 ml-1">（每件产品可拆解材料）</span>
                </div>
                <table class="w-full text-[12px]" id="unitWeightTable">
                    <thead>
                        <tr class="bg-brand-500 text-white">
                            <th class="py-2.5 px-3 text-left font-medium">名称</th>
                            <th class="py-2.5 px-2 text-center font-medium">重量(g)</th>
                            <th class="py-2.5 px-2 text-center font-medium">纯度</th>
                            <th class="py-2.5 px-3 text-right font-medium">价值</th>
                        </tr>
                    </thead>
                    <tbody id="unitWeightBody"></tbody>
                </table>
            </div>

            <!-- 产品说明 -->
            <div class="mx-4 lg:mx-0 mt-3 bg-white rounded-[14px] p-4 shadow-[0_2px_8px_rgba(0,0,0,0.03)]">
                <div class="flex items-center gap-2 mb-2">
                    <div class="w-1 h-4 bg-brand-500 rounded-full"></div>
                    <h3 class="text-[14px] font-semibold text-metal-900">产品说明</h3>
                </div>
                <div class="text-[12px] text-metal-600 leading-relaxed prose prose-sm max-w-none" id="descEl">暂无详细说明。</div>
            </div>

            <!-- 元数据 -->
            <div class="mx-4 lg:mx-0 mt-3 bg-white rounded-[14px] p-4 shadow-[0_2px_8px_rgba(0,0,0,0.03)]">
                <h3 class="text-[14px] font-semibold text-metal-900 mb-3">元数据</h3>
                <div class="space-y-2 text-[12px]" id="metaSection">
                    <div class="flex justify-between"><span class="text-metal-500">产品ID</span><span class="text-metal-800 font-mono" id="metaId">--</span></div>
                    <div class="flex justify-between"><span class="text-metal-500">所属分类</span><span class="text-metal-800" id="metaCat">--</span></div>
                    <div class="flex justify-between"><span class="text-metal-500">品牌</span><span class="text-metal-800" id="metaBrand">--</span></div>
                    <div class="flex justify-between"><span class="text-metal-500">规格</span><span class="text-metal-800 font-mono" id="metaSpec">--</span></div>
                    <div class="flex justify-between"><span class="text-metal-500">标签</span><span class="text-metal-800" id="metaTag">--</span></div>
                </div>
            </div>

            <div class="h-4"></div>
        </div>
    </main>

    <div id="admin-bottom-nav"></div>
</div>

<!-- 底部操作栏 -->
<div id="bottomBar" class="fixed bottom-[60px] left-0 right-0 bg-white border-t border-metal-100 z-30 hidden">
    <div class="max-w-[1200px] mx-auto flex items-center h-[60px] px-4 gap-3">
        <a id="editLink" href="catalog-edit.html" class="flex-1 h-10 rounded-full bg-brand-500 text-white text-[14px] font-semibold flex items-center justify-center tap-active no-underline">编辑型号</a>
        <a href="javascript:history.back()" class="flex-1 h-10 rounded-full bg-metal-100 text-metal-700 text-[14px] font-semibold flex items-center justify-center tap-active no-underline">返回列表</a>
    </div>
</div>

<script type="module">
    import { mountAdminTopbar } from '/src/components/admin-topbar.js';
    import { mountAdminBottomNav } from '/src/components/admin-bottom-nav.js';

    mountAdminTopbar('#admin-topbar', {
        title: '型号详情',
        back: true,
        onAvatar: () => location.href = '/admin/manage.html',
    });
    mountAdminBottomNav('#admin-bottom-nav', { active: 'business' });
</script>

<script>
(function () {
    var PRODUCTS = window._AL_PRODUCTS || [];
    var CAT_IMG = window._AL_CAT_IMG || {};
    var CAT_LABEL = window._AL_CAT_LABEL || {};
    var typeLabel = { contactor: '接触器', breaker: '断路器', relay: '继电器', button: '按钮开关', switch: '隔离开关' };

    // 读取 id 参数
    var id = new URLSearchParams(location.search).get('id');
    var it = PRODUCTS.find(function (x) { return x.id === id; });

    if (!it) {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('notFound').classList.remove('hidden');
        return;
    }

    // 显示主内容
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('mainContent').classList.remove('hidden');
    document.getElementById('bottomBar').classList.remove('hidden');
    document.title = it.model + ' - 铝老板管理后台';

    // 1. 产品图片
    var imgUrl = it.img || CAT_IMG[it.cat] || '';
    var imgEl = document.getElementById('productImg');
    imgEl.src = imgUrl;
    imgEl.alt = it.model;
    if (!imgUrl) {
        imgEl.style.display = 'none';
        document.getElementById('imgFallback').textContent = it.model;
    }

    // 2. 基本信息
    document.getElementById('modelName').textContent = it.model;
    document.getElementById('brandBadge').textContent = it.brand;
    document.getElementById('brandSpec').textContent = it.brand + ' · ' + it.spec;
    document.getElementById('priceEl').textContent = it.price ? '¥' + it.price : '暂无';
    document.getElementById('silverCopperEl').textContent = it.silverCopperPrice ? '¥' + it.silverCopperPrice + '/公斤' : '暂无数据';

    // 3. 关键参数
    var params = [
        { label: '品牌', value: it.brand },
        { label: '分类', value: typeLabel[it.cat] || CAT_LABEL[it.cat] || '--' },
        { label: '规格', value: it.spec, mono: true }
    ];
    document.getElementById('paramGrid').innerHTML = params.map(function (p) {
        var valueCls = (p.mono ? 'font-mono' : 'font-semibold') + ' text-metal-900 text-[13px]';
        return '<div class="bg-metal-50 rounded-xl p-2.5">' +
            '<p class="text-[10px] text-metal-500 mb-0.5">' + p.label + '</p>' +
            '<p class="' + valueCls + ' truncate">' + p.value + '</p>' +
        '</div>';
    }).join('');

    // 4. 单位重量表
    var unitWeightBody = document.getElementById('unitWeightBody');
    if (Array.isArray(it.unitWeight) && it.unitWeight.length) {
        var rowsHtml = it.unitWeight.map(function (row, idx) {
            var isLast = idx === it.unitWeight.length - 1;
            var borderCls = isLast ? '' : ' border-b border-metal-50';
            return '<tr class="' + borderCls + '">' +
                '<td class="py-2.5 px-3 text-metal-800">' + row.name + '</td>' +
                '<td class="py-2.5 px-2 text-center text-metal-500 font-mono">' + row.weight + '</td>' +
                '<td class="py-2.5 px-2 text-center text-metal-500 font-mono">' + row.purity + '</td>' +
                '<td class="py-2.5 px-3 text-right font-semibold text-amber-600 font-mono">¥' + row.value + '</td>' +
            '</tr>';
        }).join('');
        unitWeightBody.innerHTML = rowsHtml;
    } else {
        unitWeightBody.innerHTML = '<tr><td colspan="4" class="py-6 text-center text-metal-400 text-[12px]">暂无单位重量数据</td></tr>';
    }

    // 5. 产品说明
    var descHtml = it.desc || '';
    document.getElementById('descEl').innerHTML = descHtml && /<[a-z]/i.test(descHtml) ? descHtml : (descHtml || '暂无详细说明。');

    // 6. 元数据
    document.getElementById('metaId').textContent = it.id;
    document.getElementById('metaCat').textContent = typeLabel[it.cat] || '--';
    document.getElementById('metaBrand').textContent = it.brand;
    document.getElementById('metaSpec').textContent = it.spec;
    document.getElementById('metaTag').textContent = it.tag || '无';

    // 7. 编辑链接
    document.getElementById('editLink').href = 'catalog-edit.html?id=' + it.id;
})();
</script>

</body>
</html>
