<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>数据运营 - 铝老板管理后台</title>
    <script src="/lib/tailwind/tailwind.js"></script>
    <link href="/lib/fonts/fonts-admin-main.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: {
                colors: {
                    brand: { 50:'#f0fdf4',100:'#dcfce7',200:'#bbf7d0',500:'#22c55e',600:'#16a34a',700:'#15803d' },
                    metal: { 50:'#f8fafc',100:'#f1f5f9',200:'#e2e8f0',300:'#cbd5e1',400:'#94a3b8',500:'#64748b',600:'#475569',700:'#334155',800:'#1e293b',900:'#0f172a' }
                },
                fontFamily: { sans: ['Noto Sans SC','system-ui','sans-serif'], mono: ['JetBrains Mono','monospace'] }
            } }
        }
    </script>
    <style>
        body { font-family: 'Noto Sans SC', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .tap-active:active { transform: scale(0.97); }
        .admin-app { min-height: 100vh; background: #f5f5f5; }
        .admin-sticky-header { position: sticky; top: 0; z-index: 40; background: #ffffff; }
        .admin-content { padding-bottom: 80px; }
        .content-inner { max-width: 1200px; margin: 0 auto; }
        @media (min-width: 1024px) {
            .admin-content { min-height: calc(100vh - 44px); padding-bottom: 72px; }
            .content-inner { padding: 0 24px; }
        }
    </style>
</head>
<body class="bg-gray-100">

<div class="admin-app">
    <header class="admin-sticky-header">

    </header>

    <main class="admin-content">

                </div>

            </div>

            <!-- 行情走势 -->

                        <path d="M0,120 L40,110 L80,115 L120,95 L160,100 L200,80 L240,85 L280,70 L320,75 L360,60 L400,55 L440,65 L480,50 L520,45 L560,40 L600,35" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

                        <text x="300" y="175" text-anchor="middle" fill="#94a3b8" font-size="10">5/30</text>

                        <text x="600" y="175" text-anchor="middle" fill="#94a3b8" font-size="10">今日</text>
                    </svg>

            </section>

            <!-- 业务数据分布 -->
            <section class="bg-white rounded-[14px] p-4 shadow-[0_2px_8px_rgba(0,0,0,0.03)]">
                <h3 class="text-[15px] font-bold text-metal-900 mb-3">各品类询价占比</h3>
                <div class="flex items-center gap-4">

                            <circle cx="60" cy="60" r="45" fill="none" stroke="#f1f5f9" stroke-width="14"/>
                            <circle cx="60" cy="60" r="45" fill="none" stroke="#22c55e" stroke-width="14" stroke-dasharray="99 282.6" stroke-dashoffset="0" stroke-linecap="round" transform="rotate(-90 60 60)"/>

                            <circle cx="60" cy="60" r="45" fill="none" stroke="#3b82f6" stroke-width="14" stroke-dasharray="56.52 282.6" stroke-dashoffset="-183.78" stroke-linecap="round" transform="rotate(-90 60 60)"/>

                    <div class="flex-1 space-y-2">

                            <div class="flex items-center gap-2">

                        </div>
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-2">
                                <span class="w-2.5 h-2.5 rounded-full bg-amber-500"></span>
                                <span class="text-[12px] text-metal-600">接触器</span>
                            </div>
                            <span class="text-[12px] font-semibold text-metal-800">30%</span>
                        </div>
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-2">

                            </div>

                        <div class="flex items-center justify-between">

            <!-- 今日行情 -->
            <section class="bg-white rounded-[14px] p-4 shadow-[0_2px_8px_rgba(0,0,0,0.03)]">
                <div class="flex items-center justify-between mb-3">
                    <h3 class="text-[15px] font-bold text-metal-900">今日行情</h3>

                </div>
                <div class="grid grid-cols-2 gap-2">
                    <a href="quote-edit.html" class="flex items-center gap-3 p-3 bg-amber-50 rounded-[10px] tap-active no-underline">
                        <div class="w-9 h-9 rounded-full bg-amber-500 flex items-center justify-center text-white text-[14px] font-bold">Ag</div>
                        <div class="flex-1 min-w-0">
                            <p class="text-[12px] text-metal-800 font-medium">白银</p>
                            <p class="text-[14px] font-bold text-amber-600 font-mono">¥7.36/g</p>

                    </a>
                    <a href="quote-edit.html" class="flex items-center gap-3 p-3 bg-orange-50 rounded-[10px] tap-active no-underline">

                        <div class="flex-1 min-w-0">

                    <a href="quote-edit.html" class="flex items-center gap-3 p-3 bg-purple-50 rounded-[10px] tap-active no-underline">
                        <div class="w-9 h-9 rounded-full bg-purple-500 flex items-center justify-center text-white text-[14px] font-bold">Fe</div>
                        <div class="flex-1 min-w-0">

                            <p class="text-[14px] font-bold text-purple-600 font-mono">¥62.3/kg</p>

                    </a>

            <!-- 快捷入口（数据相关） -->
            <section class="bg-white rounded-[14px] p-4 shadow-[0_2px_8px_rgba(0,0,0,0.03)]">
                <h3 class="text-[15px] font-bold text-metal-900 mb-3">数据明细</h3>
                <div class="grid grid-cols-2 gap-2">
                    <a href="quote-list.html" class="flex items-center gap-3 p-3 rounded-[10px] bg-metal-50 tap-active no-underline">
                        <div class="w-9 h-9 rounded-full bg-amber-100 flex items-center justify-center text-amber-600">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-[13px] text-metal-800 font-medium">报价数据</p>
                            <p class="text-[10px] text-metal-500">报价管理明细</p>
                        </div>
                    </a>
                    <a href="inquiry-list.html" class="flex items-center gap-3 p-3 rounded-[10px] bg-metal-50 tap-active no-underline">
                        <div class="w-9 h-9 rounded-full bg-purple-100 flex items-center justify-center text-purple-600">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-[13px] text-metal-800 font-medium">询价记录</p>

                        </div>
                    </a>
                </div>
            </section>
        </div>
    </main>

    <div id="admin-bottom-nav"></div>
</div>

<script type="module">
    import { mountAdminTopbar } from '/src/components/admin-topbar.js';
    import { mountAdminBottomNav } from '/src/components/admin-bottom-nav.js';

    // 数据运营：一级菜单，不显示返回按钮
    mountAdminTopbar('#admin-topbar', {
        title: '数据运营',
        back: false,
        onMenu: () => openActionMenu(['导出报表', '刷新', '数据备份']),
        onAvatar: () => location.href = 'mine.html',
    });
    mountAdminBottomNav('#admin-bottom-nav', { active: 'data' });

    function openActionMenu(items) {
        const existing = document.getElementById('__action_menu__');
        if (existing) existing.remove();
        const menu = document.createElement('div');
        menu.id = '__action_menu__';
        menu.className = 'fixed inset-0 z-[60] flex items-end justify-center';
        menu.innerHTML = `
          <div class="absolute inset-0 bg-black/40" data-close></div>
          <div class="relative w-full bg-white rounded-t-2xl p-2 pb-6 animate-up">
            <div class="w-10 h-1 bg-metal-200 rounded-full mx-auto my-2"></div>
            ${items.map(t => `<button class="w-full text-left px-4 py-3.5 text-[14px] text-metal-800 active:bg-metal-50 rounded-xl">${t}</button>`).join('')}
            <button class="w-full text-left px-4 py-3.5 text-[14px] text-rose-600 font-medium active:bg-metal-50 rounded-xl mt-2" data-close>取消</button>
          </div>`;
        document.body.appendChild(menu);
        menu.querySelectorAll('[data-close]').forEach(el => el.addEventListener('click', () => menu.remove()));
    }
</script>

</body>
</html>
