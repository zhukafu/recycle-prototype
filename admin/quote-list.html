<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>报价管理 - 铝老板管理后台</title>
    <script src="/lib/tailwind/tailwind.js"></script>
    <link href="/lib/fonts/fonts-admin-main.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: {
                colors: {
                    brand: { 50:'#f0fdf4',100:'#dcfce7',500:'#22c55e',600:'#16a34a',700:'#15803d' },
                    metal: { 50:'#f8fafc',100:'#f1f5f9',200:'#e2e8f0',300:'#cbd5e1',400:'#94a3b8',500:'#64748b',600:'#475569',700:'#334155',800:'#1e293b',900:'#0f172a' }
                },
                fontFamily: { sans: ['Noto Sans SC','system-ui','sans-serif'], mono: ['JetBrains Mono','monospace'] }
            } }
        }
    </script>
    <style>
        body { font-family: 'Noto Sans SC', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .tap-active:active { transform: scale(0.97); }
        .admin-app { min-height: 100vh; background: #f5f5f5; }
        .admin-sticky-header { position: sticky; top: 0; z-index: 40; background: #ffffff; }
        .admin-content { padding-bottom: 80px; }
        .content-inner { max-width: 1200px; margin: 0 auto; }
        .tab-scroll { scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
        .tab-item { scroll-snap-align: start; flex-shrink: 0; }
        @media (min-width: 1024px) {
            .admin-content { min-height: calc(100vh - 44px); padding-bottom: 72px; }
            .content-inner { padding: 0 24px; }
            .tab-scroll { justify-content: flex-start; }
        }
    </style>
</head>
<body class="bg-gray-100">

<div class="admin-app">
    <header class="admin-sticky-header">
        <div id="admin-topbar"></div>
        <div class="bg-white border-b border-metal-100">
            <div class="tab-scroll flex overflow-x-auto scrollbar-hide px-4 lg:px-0">
                <button class="tab-item px-4 py-2.5 text-[13px] font-semibold text-brand-600 relative whitespace-nowrap">
                    全部<div class="absolute bottom-0 left-4 right-4 h-[2.5px] bg-brand-500 rounded-full"></div>
                </button>
                <button class="tab-item px-4 py-2.5 text-[13px] text-metal-500 relative whitespace-nowrap">贵金属</button>
                <button class="tab-item px-4 py-2.5 text-[13px] text-metal-500 relative whitespace-nowrap">有色金属</button>
                <button class="tab-item px-4 py-2.5 text-[13px] text-metal-500 relative whitespace-nowrap">稀有金属</button>
                <button class="tab-item px-4 py-2.5 text-[13px] text-metal-500 relative whitespace-nowrap">黑色金属</button>
                <button class="tab-item px-4 py-2.5 text-[13px] text-metal-500 relative whitespace-nowrap">废料</button>
            </div>
        </div>
    </header>

    <main class="admin-content">
        <div class="content-inner px-4 lg:px-0">

            <!-- 今日行情汇总 -->
            <div class="mt-4 bg-gradient-to-br from-amber-400 to-amber-500 rounded-[16px] p-4 text-white shadow-[0_4px_16px_rgba(245,158,11,0.25)]">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-[11px] opacity-85">今日白银均价</p>
                        <p class="text-[26px] font-black font-mono leading-tight mt-1">¥7.36<span class="text-[14px]">/g</span></p>
                    </div>
                    <div class="text-right">
                        <div class="flex items-center gap-1 text-[11px]">
                            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M18 15l-6-6-6 6"/></svg>
                            <span>+1.8%</span>
                        </div>
                        <p class="text-[10px] opacity-80 mt-0.5">较昨日</p>
                    </div>
                </div>
            </div>

            <!-- 报价列表 -->
            <div class="mt-3 space-y-2">
                <a href="quote-edit.html" class="block bg-white rounded-[14px] p-3 tap-active no-underline shadow-[0_2px_8px_rgba(0,0,0,0.03)]">
                    <div class="flex items-center justify-between">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2">
                                <h3 class="text-[14px] font-semibold text-metal-900 truncate">白银回收价</h3>
                                <span class="px-1.5 py-0.5 bg-amber-50 text-amber-700 text-[10px] rounded">银触点</span>
                            </div>
                            <p class="text-[11px] text-metal-500 mt-1">10分钟前更新 · 张老板</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[16px] font-bold text-amber-600 font-mono">¥7.36/g</p>
                            <p class="text-[10px] text-brand-600 font-medium mt-0.5">↑ 0.13</p>
                        </div>
                    </div>
                </a>

                <a href="quote-edit.html" class="block bg-white rounded-[14px] p-3 tap-active no-underline shadow-[0_2px_8px_rgba(0,0,0,0.03)]">
                    <div class="flex items-center justify-between">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2">
                                <h3 class="text-[14px] font-semibold text-metal-900 truncate">紫铜回收价</h3>
                                <span class="px-1.5 py-0.5 bg-amber-50 text-amber-700 text-[10px] rounded">铜</span>
                            </div>
                            <p class="text-[11px] text-metal-500 mt-1">30分钟前更新 · 张老板</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[16px] font-bold text-amber-600 font-mono">¥73.5/kg</p>
                            <p class="text-[10px] text-rose-600 font-medium mt-0.5">↓ 0.5</p>
                        </div>
                    </div>
                </a>

                <a href="quote-edit.html" class="block bg-white rounded-[14px] p-3 tap-active no-underline shadow-[0_2px_8px_rgba(0,0,0,0.03)]">
                    <div class="flex items-center justify-between">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2">
                                <h3 class="text-[14px] font-semibold text-metal-900 truncate">铝合金回收价</h3>
                                <span class="px-1.5 py-0.5 bg-amber-50 text-amber-700 text-[10px] rounded">铝</span>
                            </div>
                            <p class="text-[11px] text-metal-500 mt-1">1小时前更新 · 李老板</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[16px] font-bold text-amber-600 font-mono">¥19.8/kg</p>
                            <p class="text-[10px] text-metal-400 font-medium mt-0.5">— 持平</p>
                        </div>
                    </div>
                </a>

                <a href="quote-edit.html" class="block bg-white rounded-[14px] p-3 tap-active no-underline shadow-[0_2px_8px_rgba(0,0,0,0.03)]">
                    <div class="flex items-center justify-between">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2">
                                <h3 class="text-[14px] font-semibold text-metal-900 truncate">CJX2-8011 整件回收</h3>
                                <span class="px-1.5 py-0.5 bg-brand-50 text-brand-700 text-[10px] rounded">接触器</span>
                            </div>
                            <p class="text-[11px] text-metal-500 mt-1">2小时前更新 · 张老板</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[16px] font-bold text-amber-600 font-mono">¥160.00</p>
                            <p class="text-[10px] text-metal-400 font-medium mt-0.5">— 持平</p>
                        </div>
                    </div>
                </a>
            </div>

            <a href="quote-edit.html" class="fixed bottom-[88px] right-4 lg:bottom-24 lg:right-8 w-14 h-14 rounded-full bg-brand-500 text-white shadow-[0_8px_24px_rgba(34,197,94,0.4)] flex items-center justify-center tap-active no-underline z-30">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </a>
        </div>
    </main>

    <div id="admin-bottom-nav"></div>
</div>

<script type="module">
    import { mountAdminTopbar } from '/src/components/admin-topbar.js';
    import { mountAdminBottomNav } from '/src/components/admin-bottom-nav.js';

    mountAdminTopbar('#admin-topbar', {
        title: '报价管理',
        back: true,
        onMenu: () => openActionMenu(['导出 Excel', '批量更新', '刷新']),
        onAvatar: () => location.href = 'system.html',
    });
    mountAdminBottomNav('#admin-bottom-nav', { active: 'home' });

    function openActionMenu(items) {
        const existing = document.getElementById('__action_menu__');
        if (existing) existing.remove();
        const menu = document.createElement('div');
        menu.id = '__action_menu__';
        menu.className = 'fixed inset-0 z-[60] flex items-end justify-center';
        menu.innerHTML = `
          <div class="absolute inset-0 bg-black/40" data-close></div>
          <div class="relative w-full bg-white rounded-t-2xl p-2 pb-6 animate-up">
            <div class="w-10 h-1 bg-metal-200 rounded-full mx-auto my-2"></div>
            ${items.map(t => `<button class="w-full text-left px-4 py-3.5 text-[14px] text-metal-800 active:bg-metal-50 rounded-xl">${t}</button>`).join('')}
            <button class="w-full text-left px-4 py-3.5 text-[14px] text-rose-600 font-medium active:bg-metal-50 rounded-xl mt-2" data-close>取消</button>
          </div>`;
        document.body.appendChild(menu);
        menu.querySelectorAll('[data-close]').forEach(el => el.addEventListener('click', () => menu.remove()));
    }
</script>

</body>
</html>
