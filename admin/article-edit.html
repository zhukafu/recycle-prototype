<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>编辑资讯 - 铝老板管理后台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: {
                colors: {
                    brand: { 50:'#f0fdf4',100:'#dcfce7',200:'#bbf7d0',500:'#22c55e',600:'#16a34a',700:'#15803d' },
                    metal: { 50:'#f8fafc',100:'#f1f5f9',200:'#e2e8f0',300:'#cbd5e1',400:'#94a3b8',500:'#64748b',600:'#475569',700:'#334155',800:'#1e293b',900:'#0f172a' }
                },
                fontFamily: { sans: ['Noto Sans SC','system-ui','sans-serif'], mono: ['JetBrains Mono','monospace'] }
            } }
        }
    </script>
    <style>
        body { font-family: 'Noto Sans SC', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        .admin-app { min-height: 100vh; background: #f5f5f5; }
        .admin-sticky-header { position: sticky; top: 0; z-index: 40; background: #ffffff; }
        .admin-content { padding-bottom: 80px; }
        .content-inner { max-width: 1200px; margin: 0 auto; }
        .input { width: 100%; height: 40px; padding: 0 12px; background: #f1f5f9; border-radius: 10px; font-size: 13px; color: #0f172a; outline: none; border: 0; }
        .input:focus { background: #ffffff; box-shadow: 0 0 0 2px #22c55e; }
        textarea.input { height: auto; padding: 10px 12px; resize: vertical; min-height: 120px; }
        .field-label { display: block; font-size: 12px; font-weight: 600; color: #334155; margin-bottom: 6px; }
        .tag-chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; background: #f1f5f9; border-radius: 9999px; font-size: 12px; color: #334155; }
        @media (min-width: 1024px) {
            .admin-content { min-height: calc(100vh - 44px); padding-bottom: 72px; }
            .content-inner { padding: 0 24px; }
        }
    </style>
</head>
<body class="bg-gray-100">

<div class="admin-app">
    <header class="admin-sticky-header">
        <div id="admin-topbar"></div>
    </header>

    <main class="admin-content">
        <div class="content-inner px-4 lg:px-0 py-4 space-y-3">

            <!-- 基本信息 -->
            <section class="bg-white rounded-[14px] p-4 shadow-[0_2px_8px_rgba(0,0,0,0.03)]">
                <h3 class="text-[14px] font-bold text-metal-900 mb-3">基本信息</h3>
                <div class="space-y-3">
                    <div>
                        <label class="field-label">资讯标题 *</label>
                        <input class="input" value="接触器银触点拆解完整流程：新手必学">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="field-label">资讯分类</label>
                            <select class="input">
                                <option>回收技巧</option>
                                <option>行业资讯</option>
                                <option>新手入门</option>
                                <option>行情分析</option>
                            </select>
                        </div>
                        <div>
                            <label class="field-label">作者</label>
                            <input class="input" value="张老板">
                        </div>
                    </div>
                    <div>
                        <label class="field-label">封面图</label>
                        <div class="flex gap-2">
                            <div class="w-20 h-20 rounded-[10px] bg-gradient-to-br from-red-400 to-red-500 flex items-center justify-center text-white text-2xl flex-shrink-0">
                                🔧
                            </div>
                            <button class="w-20 h-20 rounded-[10px] border-2 border-dashed border-metal-200 text-metal-400 flex flex-col items-center justify-center gap-1 text-[11px] tap-active">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                                更换
                            </button>
                        </div>
                    </div>
                    <div>
                        <label class="field-label">摘要</label>
                        <textarea class="input" rows="2">详细讲解接触器拆解步骤，从外壳拆除到银触点分离，每一步配图说明，适合刚入行的回收新手。</textarea>
                    </div>
                </div>
            </section>

            <!-- 正文内容 -->
            <section class="bg-white rounded-[14px] p-4 shadow-[0_2px_8px_rgba(0,0,0,0.03)]">
                <h3 class="text-[14px] font-bold text-metal-900 mb-3">正文内容</h3>
                <textarea class="input font-mono" rows="10" placeholder="请输入资讯正文，支持 Markdown 格式"># 接触器银触点拆解完整流程

## 一、准备工作
- 螺丝刀套装（十字、一字）
- 尖嘴钳
- 收纳盒分类
- 防割手套

## 二、拆解步骤
1. **外壳拆除**：用螺丝刀卸下固定螺丝，分离上下壳体
2. **线圈取出**：小心取下电磁线圈，避免损坏铜线
3. **触点分离**：识别银触点位置，使用尖嘴钳小心取下
4. **分类存放**：将银触点、漆包线、塑胶件分类存放

## 三、注意事项
- 银触点极小，避免丢失
- 漆包线应保持完整便于回收
- 操作时注意安全，避免触电</textarea>
            </section>

            <!-- 标签与发布 -->
            <section class="bg-white rounded-[14px] p-4 shadow-[0_2px_8px_rgba(0,0,0,0.03)]">
                <h3 class="text-[14px] font-bold text-metal-900 mb-3">标签与发布</h3>
                <div class="space-y-3">
                    <div>
                        <label class="field-label">标签</label>
                        <div class="flex flex-wrap gap-2 mb-2">
                            <span class="tag-chip"># 银触点<button class="text-metal-400">×</button></span>
                            <span class="tag-chip"># 拆解教程<button class="text-metal-400">×</button></span>
                            <span class="tag-chip"># 新手必看<button class="text-metal-400">×</button></span>
                            <span class="tag-chip"># 接触器<button class="text-metal-400">×</button></span>
                        </div>
                        <input class="input" placeholder="输入标签后按回车">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="field-label">阅读量</label>
                            <input class="input font-mono" value="1,234">
                        </div>
                        <div>
                            <label class="field-label">点赞数</label>
                            <input class="input font-mono" value="86">
                        </div>
                    </div>
                    <div>
                        <label class="field-label">状态</label>
                        <div class="flex gap-2">
                            <label class="flex-1 flex items-center justify-center gap-2 h-10 rounded-full bg-brand-50 text-brand-700 text-[13px] font-medium cursor-pointer">
                                <input type="radio" name="status" checked class="hidden">
                                <span class="w-2 h-2 rounded-full bg-brand-500"></span>已发布
                            </label>
                            <label class="flex-1 flex items-center justify-center gap-2 h-10 rounded-full bg-metal-50 text-metal-600 text-[13px] font-medium cursor-pointer">
                                <input type="radio" name="status" class="hidden">
                                <span class="w-2 h-2 rounded-full bg-metal-300"></span>草稿
                            </label>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 操作 -->
            <div class="flex gap-3 pt-2">
                <button class="h-11 px-5 rounded-full bg-metal-100 text-metal-700 text-[14px] font-semibold tap-active">预览</button>
                <button class="flex-1 h-11 rounded-full bg-metal-100 text-metal-700 text-[14px] font-semibold tap-active">存草稿</button>
                <button class="flex-1 h-11 rounded-full bg-brand-500 text-white text-[14px] font-semibold tap-active shadow-[0_4px_12px_rgba(34,197,94,0.25)]">发布</button>
            </div>
            <div class="h-4"></div>
        </div>
    </main>

    <div id="admin-bottom-nav"></div>
</div>

<script type="module">
    import { mountAdminTopbar } from '/src/components/admin-topbar.js';
    import { mountAdminBottomNav } from '/src/components/admin-bottom-nav.js';

    mountAdminTopbar('#admin-topbar', {
        title: '编辑资讯',
        back: true,
        onMenu: () => openActionMenu(['保存草稿', '预览', '查看数据', '刷新']),
        onAvatar: () => location.href = 'mine.html',
    });
    mountAdminBottomNav('#admin-bottom-nav', { active: 'home' });

    function openActionMenu(items) {
        const existing = document.getElementById('__action_menu__');
        if (existing) existing.remove();
        const menu = document.createElement('div');
        menu.id = '__action_menu__';
        menu.className = 'fixed inset-0 z-[60] flex items-end justify-center';
        menu.innerHTML = `
          <div class="absolute inset-0 bg-black/40" data-close></div>
          <div class="relative w-full bg-white rounded-t-2xl p-2 pb-6 animate-up">
            <div class="w-10 h-1 bg-metal-200 rounded-full mx-auto my-2"></div>
            ${items.map(t => `<button class="w-full text-left px-4 py-3.5 text-[14px] text-metal-800 active:bg-metal-50 rounded-xl">${t}</button>`).join('')}
            <button class="w-full text-left px-4 py-3.5 text-[14px] text-rose-600 font-medium active:bg-metal-50 rounded-xl mt-2" data-close>取消</button>
          </div>`;
        document.body.appendChild(menu);
        menu.querySelectorAll('[data-close]').forEach(el => el.addEventListener('click', () => menu.remove()));
    }
</script>

</body>
</html>
