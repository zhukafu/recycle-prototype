<!DOCTYPE html>
<html lang="zh-CN" style="touch-action: manipulation;">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>铝老板金属网 - 产品详情</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              green: '#10B981',
              'green-dark': '#059669',
              'green-light': '#D1FAE5',
              orange: '#F97316',
              'orange-light': '#FFEDD5',
              ink: '#1F2937',
              muted: '#6B7280',
              light: '#F3F4F6',
              border: '#E5E7EB',
            }
          },
          fontFamily: {
            sans: ['Noto Sans SC', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Noto Sans SC', system-ui, sans-serif; }
    .glass-nav {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.3s ease-out; }
    .active-press:active { transform: scale(0.97); opacity: 0.8; }
    .tab-active { color: #10B981; }
    .tab-active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 20px;
      height: 3px;
      background: #10B981;
      border-radius: 2px 2px 0 0;
    }
  </style>
</head>
<body class="bg-brand-light min-h-screen pb-32 overflow-y-auto">

  <!-- Navigation Bar (固定贴顶，结构与 category.html 一致) -->
  <nav class="fixed top-0 left-0 right-0 z-50 glass-nav border-b border-brand-border/50">
    <div class="flex items-center justify-between h-12 px-3">
      <button type="button"
              onclick="if(document.referrer){history.back()}else{location.href='index.html'}"
              aria-label="返回上一页"
              class="w-10 h-10 flex items-center justify-center rounded-full active:bg-gray-100 active:scale-90 transition-transform">
        <i class="fa-solid fa-chevron-left text-lg text-brand-ink"></i>
      </button>
      <h1 class="text-base font-semibold text-brand-ink truncate max-w-[200px]">新款 CJX2-8011 正泰接触器</h1>
      <!-- 右上角操作按钮（由 page-actions 组件注入） -->
      <div id="page-actions"></div>
    </div>
  </nav>

  <!-- 占位：抵消 fixed nav 占用的高度 -->
  <div class="h-12 bg-white" aria-hidden="true"></div>

  <!-- 产品图片轮播 -->
  <section class="bg-white">
    <div class="relative h-[280px] flex items-center justify-center">
      <img
        src="/【老款】CJX2-8011 .jpg"
        alt="CJX2-8011 接触器"
        class="object-cover w-full h-full transition-opacity duration-500"
        loading="lazy"
        decoding="async"
      >
      <!-- 页码指示器 -->
      <div class="absolute bottom-4 right-4 bg-black/50 text-white text-xs px-3 py-1 rounded-full">
        1/2
      </div>
    </div>
  </section>

  <!-- 产品信息区 -->
  <section class="bg-white px-4 pt-4 pb-5 mt-2 rounded-t-2xl">
    <div class="flex items-start justify-between gap-3">
      <h2 class="text-xl font-bold text-brand-ink leading-snug">【新款】CJX2-8011</h2>
      <span class="shrink-0 bg-brand-light text-brand-muted text-xs px-2 py-1 rounded-md">正泰接触器</span>
    </div>
    
    <div class="mt-4 space-y-2">
      <div class="flex items-center gap-2">
        <span class="text-sm text-brand-muted">回收价：</span>
        <span class="text-lg font-bold text-brand-green">160.00元</span>
      </div>
      <div class="flex items-center gap-2">
        <span class="text-sm text-brand-muted">银点铜回收价：</span>
        <span class="text-lg font-bold text-brand-green">1395.64元/公斤</span>
      </div>
    </div>
  </section>

  <!-- 单位重量表格 -->
  <section class="mx-4 mt-3 bg-white rounded-xl overflow-hidden shadow-sm">
    <div class="flex items-center gap-2 px-4 py-3 border-b border-brand-border/50">
      <div class="w-1 h-5 bg-brand-green rounded-full"></div>
      <h3 class="text-base font-semibold text-brand-ink">单位重量</h3>
    </div>
    
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="bg-brand-green text-white">
            <th class="py-3 px-4 text-left font-medium">名称</th>
            <th class="py-3 px-3 text-center font-medium">重量(g)</th>
            <th class="py-3 px-3 text-center font-medium">纯度</th>
            <th class="py-3 px-4 text-right font-medium">价值</th>
          </tr>
        </thead>
        <tbody>
          <tr class="border-b border-brand-border/30">
            <td class="py-3 px-4 text-brand-ink">出白银</td>
            <td class="py-3 px-3 text-center text-brand-muted">12.5000</td>
            <td class="py-3 px-3 text-center text-brand-muted">76.00%</td>
            <td class="py-3 px-4 text-right font-semibold text-brand-green">¥149.15</td>
          </tr>
          <tr class="border-b border-brand-border/30">
            <td class="py-3 px-4 text-brand-ink">出烤点铜</td>
            <td class="py-3 px-3 text-center text-brand-muted">0.0970</td>
            <td class="py-3 px-3 text-center text-brand-muted">50.00%</td>
            <td class="py-3 px-4 text-right font-semibold text-brand-green">¥4.37</td>
          </tr>
          <tr>
            <td class="py-3 px-4 text-brand-ink">出漆包铜</td>
            <td class="py-3 px-3 text-center text-brand-muted">0.0900</td>
            <td class="py-3 px-3 text-center text-brand-muted">90.00%</td>
            <td class="py-3 px-4 text-right font-semibold text-brand-green">¥6.48</td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>

  <!-- 详情区 -->
  <section class="mx-4 mt-3 bg-white rounded-xl p-4 shadow-sm">
    <div class="flex items-center gap-2 mb-3">
      <div class="w-1 h-5 bg-brand-green rounded-full"></div>
      <h3 class="text-base font-semibold text-brand-ink">详情</h3>
    </div>
    <p class="text-sm text-brand-muted leading-relaxed">总重1.4 银铜110 线圈90 考点12.5</p>
  </section>

  <!-- 底部操作栏 -->
  <div class="fixed bottom-[60px] left-0 right-0 bg-white border-t border-brand-border/50 z-40">
    <div class="flex items-center h-[60px] px-4 gap-4">
      <button class="flex flex-col items-center gap-0.5 active-press">
        <i class="fa-solid fa-share text-brand-muted text-base"></i>
        <span class="text-[10px] text-brand-muted">分享</span>
      </button>
      <button class="flex flex-col items-center gap-0.5 active-press">
        <i class="fa-regular fa-heart text-brand-muted text-base"></i>
        <span class="text-[10px] text-brand-muted">收藏</span>
      </button>
      <button class="flex-1 bg-brand-green text-white text-sm font-semibold h-10 rounded-full active:bg-brand-green-dark transition-colors active-press">
        立即联系
      </button>
    </div>
  </div>

  <!-- 底部导航栏（由 bottom-nav 组件注入） -->
  <div id="app-bottom-nav" data-active-nav="quotes"></div>

  <script type="module">
    import { mountPageActions } from '/src/components/page-actions.js';
    import { mountBottomNav } from '/src/components/bottom-nav.js';
    mountPageActions('#page-actions', {
      onMenu: () => console.log('[product] menu clicked'),
      onAvatar: () => console.log('[product] avatar clicked'),
    });
    mountBottomNav('#app-bottom-nav', { active: 'quotes' });
  </script>

</body>
</html>
