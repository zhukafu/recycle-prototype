# 铝老板金属网 - 本地构建部署（合并服务）
# 用法：
#   1) 构建并启动（小程序 + 管理后台 同一容器）
#      docker compose up -d --build
#   2) 查看运行状态
#      docker compose ps
#   3) 查看日志
#      docker compose logs -f
#   4) 停止
#      docker compose down
#
# 访问地址：
#   - 小程序（miniprogram）: http://localhost:8080/mp/
#   - 管理后台（admin）    : http://localhost:8080/admin/

services:
  app:
    container_name: alu-app
    image: alu-boss:latest
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:80"
    networks:
      - alu-net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/mp/index.html"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  alu-net:
    driver: bridge
    name: alu-net
