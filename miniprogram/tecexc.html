<!DOCTYPE html>
<html lang="zh-CN" style="touch-action: manipulation;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>铝老板金属网 - 技术交流</title>
    <script src="/lib/tailwind/tailwind.js"></script>
    <link rel="stylesheet" href="/lib/font-awesome/6.4.0/css/all.min.css">
    <script src="/data/articles.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'al-green': '#10B981',
                        'al-green-dark': '#059669',
                        'al-orange': '#F97316',
                        'al-dark': '#1F2937',
                        'al-gray': '#6B7280',
                        'al-light': '#F3F4F6',
                        'al-blue': '#3B82F6',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('/lib/fonts/fonts-mp-tecexc.css');
        body { font-family: 'Noto Sans SC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .gradient-green { background: linear-gradient(135deg, #10B981 0%, #059669 100%); }
        .gradient-blue { background: linear-gradient(135deg, #3B82F6 0%, #1D4ED8 100%); }
        .gradient-pink { background: linear-gradient(135deg, #EC4899 0%, #BE185D 100%); }
        .gradient-orange { background: linear-gradient(135deg, #F97316 0%, #EA580C 100%); }
        .gradient-violet { background: linear-gradient(135deg, #8B5CF6 0%, #6D28D9 100%); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .tab-indicator { position: relative; }
        .tab-indicator::after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); width: 20px; height: 3px; background: #10B981; border-radius: 2px; }
    </style>
</head>
<body class="bg-al-light min-h-screen">

    <!-- 顶部 Nav (固定贴顶) -->
    <nav class="fixed top-0 left-0 right-0 z-50 glass h-12 flex items-center justify-center border-b border-gray-100">
        <h1 class="text-lg font-bold text-al-dark">技术交流</h1>
        <!-- 右上角操作按钮（由 page-actions 组件注入） -->
        <div class="absolute right-3" id="page-actions"></div>
    </nav>

    <!-- 占位：抵消 fixed nav 占用的高度 -->
    <div class="h-12" aria-hidden="true"></div>

    <!-- 主内容区（pb-20 留出底部 fixed nav 56px + 安全区的高度，避免最后一项被遮挡） -->
    <main class="px-4 pt-6 pb-20 space-y-4">

        <!-- 通知栏：业务相关，链接到通知公告详情页 -->
        <a href="info-detail.html?id=notice-silver-price" class="flex items-center gap-3 bg-white rounded-2xl p-4 shadow-sm no-underline active:scale-[0.99] transition-transform" id="noticeBar">
            <div class="w-10 h-10 rounded-full bg-blue-50 flex items-center justify-center flex-shrink-0">
                <i class="fas fa-bell text-al-blue"></i>
            </div>
            <p class="text-sm text-al-dark font-medium flex-1 truncate" id="noticeText">白银价格突破 8000 元/千克，行情组紧急上调参考报价</p>
            <i class="fas fa-chevron-right text-al-gray text-xs"></i>
        </a>

        <!-- 卡片区域 -->
        <div class="grid grid-cols-3 gap-3">
            <!-- 关于铝老板（跳转到平台介绍详情页） -->
            <a href="info-detail.html?id=about" class="col-span-1 row-span-2 gradient-blue rounded-2xl p-5 flex flex-col justify-between text-white relative overflow-hidden shadow-md no-underline active:scale-[0.98] transition-transform">
                <div>
                    <h3 class="text-lg font-bold">关于铝老板</h3>
                    <p class="text-xs text-blue-100 mt-1">About Us</p>
                </div>
                <div class="self-end">
                    <i class="fas fa-arrow-right text-white/60"></i>
                </div>
            </a>
            <!-- 行业资讯 -->
            <a href="info-list.html?type=news" class="col-span-2 bg-white rounded-2xl p-4 flex items-center gap-3 shadow-sm active:scale-[0.98] transition-transform no-underline">
                <div class="w-12 h-12 rounded-xl bg-orange-50 flex items-center justify-center flex-shrink-0">
                    <i class="fas fa-newspaper text-al-orange text-lg"></i>
                </div>
                <div>
                    <h4 class="text-sm font-bold text-al-dark">行业资讯</h4>
                    <p class="text-xs text-al-gray mt-0.5">最新行业动态</p>
                </div>
                <i class="fas fa-chevron-right text-al-gray text-xs ml-auto"></i>
            </a>
            <!-- 回收知识 -->
            <a href="info-list.html?type=knowledge" class="col-span-2 bg-white rounded-2xl p-4 flex items-center gap-3 shadow-sm active:scale-[0.98] transition-transform no-underline">
                <div class="w-12 h-12 rounded-xl bg-green-50 flex items-center justify-center flex-shrink-0">
                    <i class="fas fa-book-open text-al-green text-lg"></i>
                </div>
                <div>
                    <h4 class="text-sm font-bold text-al-dark">回收知识</h4>
                    <p class="text-xs text-al-gray mt-0.5">专业回收技巧</p>
                </div>
                <i class="fas fa-chevron-right text-al-gray text-xs ml-auto"></i>
            </a>
        </div>

        <!-- 标签页切换：两个分类标题 -->
        <div class="flex items-center gap-8 px-2">
            <button id="tabNews" class="text-sm text-al-dark font-bold pb-2 tab-indicator" data-tab="news">行业资讯</button>
            <button id="tabKnowledge" class="text-sm text-al-gray font-medium pb-2" data-tab="knowledge">回收知识</button>
        </div>

        <!-- 分类下代表性文章预览（从 articles.js 动态渲染） -->
        <div id="previewList" class="space-y-3"></div>
    </main>

    <!-- 底部导航栏（由 bottom-nav 组件注入，"技术交流" 高亮） -->
    <div id="app-bottom-nav" data-active-nav="forum"></div>

    <script type="module">
        import { mountPageActions } from '/src/components/page-actions.js';
        import { mountBottomNav } from '/src/components/bottom-nav.js';
        mountPageActions('#page-actions', {
            onMenu: () => console.log('[tecexc] menu clicked'),
            onAvatar: () => console.log('[tecexc] avatar clicked'),
        });
        mountBottomNav('#app-bottom-nav', { active: 'forum' });
    </script>

    <script>
        // 工具：数字格式化
        function formatNum(n) { return n >= 1000 ? (n / 1000).toFixed(1) + 'k' : n; }

        // 渲染单个代表性文章预览卡片
        function renderPreviewItem(it) {
            const isKnowledge = it.cat === 'knowledge';
            const tagBg = isKnowledge ? 'bg-green-50' : 'bg-orange-50';
            const tagColor = isKnowledge ? 'text-al-green' : 'text-al-orange';
            const tagIcon = isKnowledge ? 'fa-book-open' : 'fa-newspaper';
            return `
                <a href="info-detail.html?id=${it.id}" class="block bg-white rounded-2xl p-4 shadow-sm no-underline active:scale-[0.99] transition-transform">
                    <div class="flex items-start gap-3">
                        <div class="w-10 h-10 rounded-xl ${tagBg} flex items-center justify-center flex-shrink-0">
                            <i class="fas ${tagIcon} ${tagColor} text-base"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-1.5 mb-1">
                                <span class="text-[9px] bg-gray-100 text-al-gray px-1.5 py-0.5 rounded font-medium">${it.tag}</span>
                            </div>
                            <h4 class="text-sm font-bold text-al-dark leading-snug line-clamp-2 mb-1">${it.title}</h4>
                            <p class="text-xs text-al-gray leading-relaxed line-clamp-2 mb-2">${it.summary}</p>
                            <div class="flex items-center gap-3 text-[11px] text-al-gray">
                                <span><i class="far fa-user mr-0.5"></i>${it.author}</span>
                                <span><i class="far fa-clock mr-0.5"></i>${it.date}</span>
                                <span class="ml-auto flex items-center gap-2">
                                    <span><i class="far fa-eye mr-0.5"></i>${formatNum(it.views)}</span>
                                    <span><i class="far fa-comment mr-0.5"></i>${(window._AL_ARTICLES.getComments(it.id) || []).length}</span>
                                </span>
                            </div>
                        </div>
                    </div>
                </a>
            `;
        }

        // 取当前分类下"代表性文章"：按热度(views)排序后取前 3
        function pickPreviewList(cat) {
            const list = (window._AL_ARTICLES.getList(cat) || []).slice();
            return list.sort((a, b) => b.views - a.views).slice(0, 3);
        }

        // 当前 tab 状态
        let currentTab = 'news';

        function renderPreview() {
            const data = pickPreviewList(currentTab);
            const wrap = document.getElementById('previewList');
            if (!data.length) {
                wrap.innerHTML = '<div class="text-center text-xs text-al-gray py-6">暂无内容</div>';
                return;
            }
            wrap.innerHTML = data.map(renderPreviewItem).join('');
        }

        function setActiveTab(tab) {
            currentTab = tab;
            const tabs = document.querySelectorAll('[data-tab]');
            tabs.forEach(btn => {
                const isActive = btn.getAttribute('data-tab') === tab;
                btn.className = isActive
                    ? 'text-sm text-al-dark font-bold pb-2 tab-indicator'
                    : 'text-sm text-al-gray font-medium pb-2';
            });
            renderPreview();
        }

        // 通知栏：绑定业务相关公告标题（如有则取最新一条）
        function bindNoticeBar() {
            const list = (window._AL_ARTICLES && window._AL_ARTICLES.getList('notice')) || [];
            const latest = list[0];
            const txt = document.getElementById('noticeText');
            const bar = document.getElementById('noticeBar');
            if (latest) {
                txt.textContent = latest.title;
                bar.setAttribute('href', 'info-detail.html?id=' + latest.id);
            }
        }

        // 标签切换事件
        document.querySelectorAll('[data-tab]').forEach(btn => {
            btn.addEventListener('click', () => setActiveTab(btn.getAttribute('data-tab')));
        });

        // 页面加载
        document.addEventListener('DOMContentLoaded', () => {
            bindNoticeBar();
            setActiveTab('news');
        });
    </script>
</body>
</html>
