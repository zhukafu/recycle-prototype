<!DOCTYPE html>
<html lang="zh-CN" style="touch-action: manipulation;">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>铝老板金属网 - 技术交流</title>
    <script src="/lib/tailwind/tailwind.js"></script>
    <link rel="stylesheet" href="/lib/font-awesome/6.4.0/css/all.min.css">
    <script src="/data/articles.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'al-green': '#10B981',
                        'al-green-dark': '#059669',
                        'al-orange': '#F97316',
                        'al-dark': '#1F2937',
                        'al-gray': '#6B7280',
                        'al-light': '#F3F4F6',
                        'al-blue': '#3B82F6',
                    }
                }
            }
        }
    </script>
    <style>
        @import url('/lib/fonts/fonts-mp-tecexc.css');
        body { font-family: 'Noto Sans SC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass { background: rgba(255,255,255,0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .gradient-green { background: linear-gradient(135deg, #10B981 0%, #059669 100%); }
        .gradient-blue { background: linear-gradient(135deg, #3B82F6 0%, #1D4ED8 100%); }
        .gradient-pink { background: linear-gradient(135deg, #EC4899 0%, #BE185D 100%); }
        .gradient-orange { background: linear-gradient(135deg, #F97316 0%, #EA580C 100%); }
        .gradient-violet { background: linear-gradient(135deg, #8B5CF6 0%, #6D28D9 100%); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .tab-indicator { position: relative; }
        .tab-indicator::after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); width: 20px; height: 3px; background: #10B981; border-radius: 2px; }

        /* 公告轮播（固定高度，标题上下循环滚动） */
        .notice-carousel {
            position: relative;
            overflow: hidden;
            border-radius: 16px;
            height: 56px;              /* 固定单行高度 */
        }
        .notice-track {
            transition: transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            display: flex;
            flex-direction: column;
        }
        .notice-slide {
            flex-shrink: 0;
            height: 56px;             /* 与容器等高，每次只显示一条 */
            display: flex;
            align-items: center;
        }
        .notice-dots { position: absolute; bottom: 6px; right: 10px; display: flex; gap: 4px; z-index: 2; }
        .notice-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.4); transition: all 0.3s; }
        .notice-dot.active { width: 12px; border-radius: 3px; background: #fff; }
    </style>
</head>
<body class="bg-al-light min-h-screen">

    <!-- 顶部 Nav (固定贴顶) -->
    <nav class="fixed top-0 left-0 right-0 z-50 glass h-12 flex items-center justify-center border-b border-gray-100">
        <h1 class="text-lg font-bold text-al-dark">技术交流</h1>
        <!-- 右上角操作按钮（由 page-actions 组件注入） -->
        <div class="absolute right-3" id="page-actions"></div>
    </nav>

    <!-- 占位：抵消 fixed nav 占用的高度 -->
    <div class="h-12" aria-hidden="true"></div>

    <!-- 主内容区（pb-20 留出底部 fixed nav 56px + 安全区的高度，避免最后一项被遮挡） -->
    <main class="px-4 pt-6 pb-20 space-y-4">

        <!-- 通知栏：业务相关，支持多条时自动滚动轮播 -->
        <div class="notice-carousel bg-white rounded-2xl shadow-sm" id="noticeCarousel">
            <div class="notice-track" id="noticeTrack">
                <!-- 动态渲染 -->
            </div>
            <div class="notice-dots" id="noticeDots" style="display:none;"></div>
        </div>

        <!-- 卡片区域 -->
        <div class="grid grid-cols-3 gap-3">
            <!-- 关于铝老板（跳转到平台介绍详情页） -->
            <a href="info-detail.html?id=about" class="col-span-1 row-span-2 bg-white border border-gray-100 rounded-2xl p-4 flex flex-col relative overflow-hidden shadow-md no-underline active:scale-[0.98] transition-transform">
                <!-- 装饰光斑 -->
                <div class="absolute -top-6 -right-6 w-20 h-20 bg-green-100/40 rounded-full blur-2xl pointer-events-none"></div>
                <div class="absolute -bottom-4 -left-4 w-16 h-16 bg-green-100/40 rounded-full blur-2xl pointer-events-none"></div>
                <div class="relative z-10 flex flex-col h-full">
                    <span class="inline-flex w-fit bg-green-100 text-green-700 text-[10px] font-bold px-2 py-0.5 rounded-full mb-2">平台</span>
                    <h3 class="text-lg font-black text-gray-900 mb-0.5">关于铝老板</h3>
                    <p class="text-[10px] text-gray-500 leading-snug mb-2.5">专业含银废料回收服务平台</p>
                    <!-- 服务亮点 -->
                    <div class="space-y-1.5 mb-2">
                        <div class="flex items-center gap-1.5">
                            <span class="w-1 h-1 rounded-full bg-green-400"></span>
                            <span class="text-[10px] text-gray-700">实时行情报价</span>
                        </div>
                        <div class="flex items-center gap-1.5">
                            <span class="w-1 h-1 rounded-full bg-green-400"></span>
                            <span class="text-[10px] text-gray-700">接触器数据库</span>
                        </div>
                        <div class="flex items-center gap-1.5">
                            <span class="w-1 h-1 rounded-full bg-green-400"></span>
                            <span class="text-[10px] text-gray-700">技术交流社区</span>
                        </div>
                    </div>
                    <!-- 分隔线 + CTA -->
                    <div class="mt-auto pt-2 border-t border-gray-100 flex items-center justify-between">
                        <span class="text-[10px] text-gray-400">了解更多</span>
                        <i class="fas fa-arrow-right text-gray-400 text-xs"></i>
                    </div>
                </div>
            </a>
            <!-- 行业资讯 -->
            <a href="info-list.html?type=news" class="col-span-2 bg-white rounded-2xl p-4 flex items-center gap-3 shadow-sm active:scale-[0.98] transition-transform no-underline">
                <div class="w-12 h-12 rounded-xl bg-orange-50 flex items-center justify-center flex-shrink-0">
                    <i class="fas fa-newspaper text-al-orange text-lg"></i>
                </div>
                <div>
                    <h4 class="text-sm font-bold text-al-dark">行业资讯</h4>
                    <p class="text-xs text-al-gray mt-0.5">最新行业动态</p>
                </div>
                <i class="fas fa-chevron-right text-al-gray text-xs ml-auto"></i>
            </a>
            <!-- 回收知识 -->
            <a href="info-list.html?type=knowledge" class="col-span-2 bg-white rounded-2xl p-4 flex items-center gap-3 shadow-sm active:scale-[0.98] transition-transform no-underline">
                <div class="w-12 h-12 rounded-xl bg-green-50 flex items-center justify-center flex-shrink-0">
                    <i class="fas fa-book-open text-al-green text-lg"></i>
                </div>
                <div>
                    <h4 class="text-sm font-bold text-al-dark">回收知识</h4>
                    <p class="text-xs text-al-gray mt-0.5">专业回收技巧</p>
                </div>
                <i class="fas fa-chevron-right text-al-gray text-xs ml-auto"></i>
            </a>
        </div>

        <!-- 标签页切换：两个分类标题 -->
        <div class="flex items-center gap-8 px-2">
            <button id="tabNews" class="text-sm text-al-dark font-bold pb-2 tab-indicator" data-tab="news">行业资讯</button>
            <button id="tabKnowledge" class="text-sm text-al-gray font-medium pb-2" data-tab="knowledge">回收知识</button>
        </div>

        <!-- 分类下代表性文章预览（从 articles.js 动态渲染） -->
        <div id="previewList" class="space-y-3"></div>
    </main>

    <!-- 底部导航栏（由 bottom-nav 组件注入，"技术交流" 高亮） -->
    <div id="app-bottom-nav" data-active-nav="forum"></div>

    <script type="module">
        import { mountPageActions } from '/src/components/page-actions.js';
        import { mountBottomNav } from '/src/components/bottom-nav.js';
        mountPageActions('#page-actions', {
            onMenu: () => console.log('[tecexc] menu clicked'),
            onAvatar: () => console.log('[tecexc] avatar clicked'),
        });
        mountBottomNav('#app-bottom-nav', { active: 'forum' });
    </script>

    <script>
        // 工具：数字格式化
        function formatNum(n) { return n >= 1000 ? (n / 1000).toFixed(1) + 'k' : n; }

        // 渲染单个代表性文章预览卡片
        function renderPreviewItem(it) {
            const isKnowledge = it.cat === 'knowledge';
            const tagBg = isKnowledge ? 'bg-green-50' : 'bg-orange-50';
            const tagColor = isKnowledge ? 'text-al-green' : 'text-al-orange';
            const tagIcon = isKnowledge ? 'fa-book-open' : 'fa-newspaper';
            return `
                <a href="info-detail.html?id=${it.id}" class="block bg-white rounded-2xl p-4 shadow-sm no-underline active:scale-[0.99] transition-transform">
                    <div class="flex items-start gap-3">
                        <div class="w-10 h-10 rounded-xl ${tagBg} flex items-center justify-center flex-shrink-0">
                            <i class="fas ${tagIcon} ${tagColor} text-base"></i>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-1.5 mb-1">
                                <span class="text-[9px] bg-gray-100 text-al-gray px-1.5 py-0.5 rounded font-medium">${it.tags ? it.tags[0] : (it.cat === 'knowledge' ? '回收知识' : '行业资讯')}</span>
                            </div>
                            <h4 class="text-sm font-bold text-al-dark leading-snug line-clamp-2 mb-1">${it.title}</h4>
                            <p class="text-xs text-al-gray leading-relaxed line-clamp-2 mb-2">${it.summary}</p>
                            <div class="flex items-center gap-3 text-[11px] text-al-gray">
                                <span><i class="far fa-user mr-0.5"></i>${it.author}</span>
                                <span><i class="far fa-clock mr-0.5"></i>${it.date}</span>
                                <span class="ml-auto flex items-center gap-2">
                                    <span><i class="far fa-eye mr-0.5"></i>${formatNum(it.views)}</span>
                                    <span><i class="far fa-comment mr-0.5"></i>${(window._AL_ARTICLES.getComments(it.id) || []).length}</span>
                                </span>
                            </div>
                        </div>
                    </div>
                </a>
            `;
        }

        // 取当前分类下"代表性文章"（仅已发布）：按热度(views)排序后取前 3
        function pickPreviewList(cat) {
            var list = [];
            if (window._AL_ARTICLES && window._AL_ARTICLES.getArticles) {
                list = window._AL_ARTICLES.getArticles(cat) || []; // 默认已过滤草稿
            } else {
                list = (window._AL_ARTICLES.getList(cat) || []).filter(function(a) { return a.status !== 'draft'; });
            }
            return list.sort(function(a, b) { return b.views - a.views; }).slice(0, 3);
        }

        // 当前 tab 状态
        let currentTab = 'news';

        function renderPreview() {
            const data = pickPreviewList(currentTab);
            const wrap = document.getElementById('previewList');
            if (!data.length) {
                wrap.innerHTML = '<div class="text-center text-xs text-al-gray py-6">暂无内容</div>';
                return;
            }
            wrap.innerHTML = data.map(renderPreviewItem).join('');
        }

        function setActiveTab(tab) {
            currentTab = tab;
            const tabs = document.querySelectorAll('[data-tab]');
            tabs.forEach(btn => {
                const isActive = btn.getAttribute('data-tab') === tab;
                btn.className = isActive
                    ? 'text-sm text-al-dark font-bold pb-2 tab-indicator'
                    : 'text-sm text-al-gray font-medium pb-2';
            });
            renderPreview();
        }

        // 通知栏：支持多条时自动滚动轮播
        let _noticeTimer = null;
        let _noticeIndex = 0;

        function bindNoticeBar() {
            const list = (window._AL_ARTICLES && window._AL_ARTICLES.getNoticeArticles
                ? window._AL_ARTICLES.getNoticeArticles()
                : (window._AL_ARTICLES && window._AL_ARTICLES.getList('notice')) || []
            ).filter(function(a) { return a && a.status !== 'draft'; });

            const track = document.getElementById('noticeTrack');
            const dotsEl = document.getElementById('noticeDots');

            if (!list.length) {
                track.innerHTML = '<div class="notice-slide flex items-center gap-3 px-4"><div class="w-8 h-8 rounded-full bg-blue-50 flex items-center justify-center flex-shrink-0"><i class="fas fa-bell text-al-blue text-xs"></i></div><p class="text-sm text-al-gray font-medium">暂无公告</p></div>';
                dotsEl.style.display = 'none';
                return;
            }

            // 渲染所有幻灯片
            track.innerHTML = list.map(function(item) {
                return '<a href="info-detail.html?id=' + item.id + '" class="notice-slide flex items-center gap-3 px-4 no-underline active:scale-[0.99] transition-transform">' +
                    '<div class="w-8 h-8 rounded-full bg-blue-50 flex items-center justify-center flex-shrink-0"><i class="fas fa-bell text-al-blue text-xs"></i></div>' +
                    '<p class="text-sm text-al-dark font-medium flex-1 truncate">' + item.title + '</p>' +
                    '<i class="fas fa-chevron-right text-al-gray text-xs flex-shrink-0"></i></a>';
            }).join('');

            if (list.length >= 2) {
                // 轮播模式：渲染指示点 + 启动自动滚动
                dotsEl.style.display = 'flex';
                dotsEl.innerHTML = list.map(function(_, i) {
                    return '<span class="notice-dot' + (i === 0 ? ' active' : '') + '" data-nidx="' + i + '"></span>';
                }).join('');
                _noticeIndex = 0;
                startNoticeCarousel(list.length);
            } else {
                // 静态模式（1~2条不滚动）
                dotsEl.style.display = 'none';
                track.style.transform = 'translateY(0)';
                stopNoticeCarousel();
            }

            // 点击指示点跳转
            dotsEl.addEventListener('click', function(e) {
                var dot = e.target.closest('[data-nidx]');
                if (!dot || list.length < 2) return;
                var idx = parseInt(dot.getAttribute('data-nidx'), 10);
                if (isNaN(idx)) return;
                jumpToNoticeSlide(idx, list.length);
            });
        }

        function startNoticeCarousel(total) {
            stopNoticeCarousel();
            _noticeTimer = setInterval(function() {
                _noticeIndex = (_noticeIndex + 1) % total;
                updateNoticePosition(total);
            }, 3000);
        }

        function stopNoticeCarousel() {
            if (_noticeTimer) { clearInterval(_noticeTimer); _noticeTimer = null; }
        }

        function jumpToNoticeSlide(idx, total) {
            _noticeIndex = idx;
            updateNoticePosition(total);
            stopNoticeCarousel();
            startNoticeCarousel(total); // 重置计时器
        }

        function updateNoticePosition(total) {
            var track = document.getElementById('noticeTrack');
            var slideH = 56; // 固定高度，与 CSS .notice-slide height 一致
            track.style.transform = 'translateY(-' + (_noticeIndex * slideH) + 'px)';
            // 更新指示点
            document.querySelectorAll('#noticeDots .notice-dot').forEach(function(d, i) {
                d.classList.toggle('active', i === _noticeIndex);
            });
        }

        // 标签切换事件
        document.querySelectorAll('[data-tab]').forEach(btn => {
            btn.addEventListener('click', () => setActiveTab(btn.getAttribute('data-tab')));
        });

        // 页面加载
        document.addEventListener('DOMContentLoaded', () => {
            bindNoticeBar();
            setActiveTab('news');
        });
    </script>
</body>
</html>
