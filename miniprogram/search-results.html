<!DOCTYPE html>
<html lang="zh-CN" style="touch-action: manipulation;">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>搜索结果 - 铝老板金属网</title>
<script src="/lib/tailwind/tailwind.js"></script>
<link href="/lib/fonts/fonts-mp-main.css" rel="stylesheet"/>
<script>
tailwind.config = {
theme: {
extend: {
colors: {
green: { brand: '#10B981', light: '#34D399', dark: '#059669', surface: '#ECFDF5' },
orange: { brand: '#F97316', light: '#FB923C', dark: '#EA580C', surface: '#FFF7ED' },
red: { brand: '#EF4444', light: '#F87171', dark: '#DC2626', surface: '#FEF2F2' },
amber: { brand: '#F59E0B', light: '#FCD34D', dark: '#D97706', surface: '#FFFBEB' },
slate: { brand: '#64748B', light: '#94A3B8', dark: '#475569', surface: '#F8FAFC' },
cyan: { brand: '#06B6D4', light: '#22D3EE', dark: '#0891B2', surface: '#ECFEFF' },
gray: { bg: '#F5F5F4', card: '#FAFAF9', border: '#E7E5E4' }
},
fontFamily: {
sans: ['Noto Sans SC', 'system-ui', 'sans-serif'],
serif: ['Noto Serif SC', 'serif']
}
}
}
}
</script>
<style>
body { font-family: 'Noto Sans SC', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
.hide-scrollbar::-webkit-scrollbar { display: none; }
.hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
@keyframes slideInUp {
from { opacity: 0; transform: translateY(10px); }
to { opacity: 1; transform: translateY(0); }
}
.slide-up { animation: slideInUp 0.35s ease-out forwards; }
mark { background: linear-gradient(transparent 60%, #FDE68A 60%); color: inherit; padding: 0 1px; border-radius: 2px; }
@keyframes pulseDot {
0%, 100% { opacity: 0.4; }
50% { opacity: 1; }
}
.dot { animation: pulseDot 1.2s ease-in-out infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }
</style>
</head>
<body class="bg-gray-bg min-h-screen pb-20">

<!-- 顶部导航 + 搜索栏 -->
<header class="sticky top-0 z-50 bg-white border-b border-gray-100 shadow-sm">
  <div class="px-4 py-3 flex items-center gap-2.5">
    <a href="javascript:history.back()" class="w-8 h-8 -ml-1 flex items-center justify-center rounded-full active:bg-gray-100 transition-colors flex-shrink-0" aria-label="返回">
      <svg class="w-5 h-5 text-gray-700" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"></path>
      </svg>
    </a>
    <form class="flex-1 relative" onsubmit="onSearchSubmit(event)">
      <div class="flex items-center gap-2 bg-gray-bg rounded-2xl pl-3.5 pr-1.5 py-1.5 focus-within:bg-white focus-within:ring-2 focus-within:ring-green-brand transition-all">
        <svg class="w-4 h-4 text-gray-400 flex-shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"></path>
        </svg>
        <input
          type="text"
          id="searchInput"
          aria-label="搜索"
          placeholder="搜索型号 / 参数 / 规格 / 厂家"
          class="flex-1 min-w-0 text-[14px] text-gray-800 placeholder-gray-400 bg-transparent outline-none font-normal h-8"
        >
        <button type="button" id="searchClear" aria-label="清除" class="hidden w-6 h-6 rounded-full bg-gray-200 text-gray-500 flex-shrink-0 items-center justify-center active:scale-90 transition">
          <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
      </div>
    </form>
  </div>
</header>

<!-- 搜索状态信息（搜索词 + 结果数） -->
<div class="bg-white border-b border-gray-100">
  <div class="px-4 py-3 flex items-center justify-between">
    <p class="text-[13px] text-gray-600">
      为您找到
      <span class="text-green-brand font-black text-base mx-0.5" id="resultCount">0</span>
      条
      <span class="text-gray-900 font-bold">"<span id="queryText" class="text-orange-brand"></span>"</span>
      的相关结果
    </p>
    <!-- 排序 -->
    <button id="sortBtn" class="flex items-center gap-0.5 text-[12px] text-gray-500 font-medium px-2 py-1 rounded-lg active:bg-gray-100 transition" aria-label="切换排序">
      <span data-sort-label>综合</span>
      <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 15L12 18.75 15.75 15m-7.5-6L12 5.25 15.75 9"></path></svg>
    </button>
  </div>
  <!-- 分类筛选 Tab -->
  <div class="flex gap-1 px-4 pb-2 overflow-x-auto hide-scrollbar" id="catTabs">
    <button class="text-[12px] font-bold text-green-brand border-b-2 border-green-brand py-1.5 px-2.5 flex-shrink-0 transition-colors" data-cat="all">全部</button>
    <button class="text-[12px] font-medium text-gray-500 py-1.5 px-2.5 flex-shrink-0 transition-colors" data-cat="contactor">接触器</button>
    <button class="text-[12px] font-medium text-gray-500 py-1.5 px-2.5 flex-shrink-0 transition-colors" data-cat="breaker">断路器</button>
    <button class="text-[12px] font-medium text-gray-500 py-1.5 px-2.5 flex-shrink-0 transition-colors" data-cat="switch">隔离开关</button>
    <button class="text-[12px] font-medium text-gray-500 py-1.5 px-2.5 flex-shrink-0 transition-colors" data-cat="relay">继电器</button>
    <button class="text-[12px] font-medium text-gray-500 py-1.5 px-2.5 flex-shrink-0 transition-colors" data-cat="button">按钮开关</button>
  </div>
</div>

<!-- 加载中状态 -->
<div id="loadingState" class="px-4 py-12 text-center hidden">
  <div class="inline-flex items-center gap-1 text-gray-400 text-sm">
    <span class="dot w-1.5 h-1.5 rounded-full bg-green-brand"></span>
    <span class="dot w-1.5 h-1.5 rounded-full bg-green-brand"></span>
    <span class="dot w-1.5 h-1.5 rounded-full bg-green-brand"></span>
    <span class="ml-2">正在搜索中</span>
  </div>
</div>

<!-- 搜索结果列表 -->
<div id="resultList" class="px-4 pt-3 space-y-2.5"></div>

<!-- 空状态 -->
<div id="emptyState" class="px-4 py-16 text-center hidden">
  <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
    <svg class="w-10 h-10 text-gray-300" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z"></path>
    </svg>
  </div>
  <p class="text-gray-900 font-bold text-base">未找到相关结果</p>
  <p class="text-gray-400 text-sm mt-1">请尝试其他关键词或更换分类</p>
  <div class="mt-6 flex flex-wrap gap-2 justify-center" id="suggestTags"></div>
</div>

<!-- 底部固定导航栏 -->
<div id="app-bottom-nav" data-active-nav="quotes"></div>

<script type="module">
  import { mountBottomNav } from '/src/components/bottom-nav.js';
  const navSlot = document.getElementById('app-bottom-nav');
  mountBottomNav(navSlot, { active: navSlot.dataset.activeNav || 'quotes' });
</script>

<script src="/data/contacts.js"></script>
<script src="/data/site-config.js"></script>
<script>
  // 数据从共享脚本 window._AL_PRODUCTS 读取
  const CONTACTS = window._AL_PRODUCTS || [];
  const CAT_IMG = window._AL_CAT_IMG || {};

  const CAT_LABEL = Object.assign({ all: '全部' }, window._AL_CAT_LABEL || {});
  const CAT_COLOR = window._AL_CAT_COLOR || {};

  // 状态
  const state = { q: '', cat: 'all', sort: 'default' };

  // URL 参数解析
  const params = new URLSearchParams(location.search);
  state.q = (params.get('q') || '').trim();
  document.getElementById('queryText').textContent = state.q;
  document.getElementById('searchInput').value = state.q;

  // 搜索（关键词高亮）
  function highlight(text, q) {
    if (!q) return text;
    const escaped = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return text.replace(new RegExp('(' + escaped + ')', 'gi'), '<mark>$1</mark>');
  }

  // 匹配
  function match(item, q) {
    if (!q) return true;
    const lower = q.toLowerCase();
    return ['model', 'brand', 'spec'].some(k => (item[k] || '').toLowerCase().includes(lower));
  }

  // 渲染
  function render() {
    const list = document.getElementById('resultList');
    const empty = document.getElementById('emptyState');
    const loading = document.getElementById('loadingState');

    // 模拟加载
    list.innerHTML = '';
    empty.classList.add('hidden');
    loading.classList.remove('hidden');
    document.getElementById('resultCount').textContent = '0';

    setTimeout(() => {
      loading.classList.add('hidden');
      const filtered = CONTACTS.filter(it => state.cat === 'all' || it.cat === state.cat).filter(it => match(it, state.q));

      // 排序
      if (state.sort === 'priceAsc') filtered.sort((a, b) => parseFloat(a.price) - parseFloat(b.price));
      else if (state.sort === 'priceDesc') filtered.sort((a, b) => parseFloat(b.price) - parseFloat(a.price));
      else if (state.sort === 'silver') filtered.sort((a, b) => parseFloat(b.silver) - parseFloat(a.silver));

      document.getElementById('resultCount').textContent = filtered.length;

      if (filtered.length === 0) {
        empty.classList.remove('hidden');
        list.innerHTML = '';
        // 建议词
        const tags = ['CJX2-1810', '施耐德', '正泰', '银触点', '断路器'];
        document.getElementById('suggestTags').innerHTML = tags.map(t =>
          `<a href="search-results.html?q=${encodeURIComponent(t)}" class="text-[12px] bg-white border border-gray-200 text-gray-600 px-3 py-1.5 rounded-full active:scale-95 transition">${t}</a>`
        ).join('');
        return;
      }

      list.innerHTML = filtered.map((it, idx) => {
        const color = CAT_COLOR[it.cat] || 'gray';
        const stockColor = it.stock === '现货' ? 'text-green-brand bg-green-surface' : 'text-orange-brand bg-orange-surface';
        const colorMap = {
          green:  { bg: 'bg-green-surface',  text: 'text-green-dark' },
          amber:  { bg: 'bg-amber-surface',  text: 'text-amber-dark' },
          cyan:   { bg: 'bg-cyan-surface',   text: 'text-cyan-dark' },
          slate:  { bg: 'bg-slate-surface',  text: 'text-slate-dark' },
          purple: { bg: 'bg-purple-50',      text: 'text-purple-600' },
          gray:   { bg: 'bg-gray-100',       text: 'text-gray-700' }
        };
        const cm = colorMap[color] || colorMap.gray;
        const catLabel = (window._AL_CAT_LABEL || {})[it.cat] || '产品';
        const imgUrl = it.img || CAT_IMG[it.cat] || '';
        return `
          <a href="javascript:void(0)" onclick="showItemDetail('${it.id}')" class="block bg-white rounded-2xl p-2.5 shadow-[0_2px_8px_rgba(0,0,0,0.04)] border border-gray-100 active:scale-[0.99] transition-transform slide-up no-underline" style="animation-delay: ${Math.min(idx * 0.03, 0.3)}s">
            <div class="flex items-center gap-3">
              <!-- 真实产品图 -->
              <div class="w-16 h-16 rounded-xl ${cm.bg} flex items-center justify-center flex-shrink-0 overflow-hidden">
                <img src="${imgUrl}" alt="${it.model}" loading="lazy" class="w-full h-full object-contain p-0.5" onerror="this.style.display='none';this.parentElement.innerHTML='<span class=&quot;text-[10px] ${cm.text} font-bold leading-none text-center&quot;>${catLabel}</span>';">
              </div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-1.5 mb-0.5">
                  <span class="text-[15px] font-bold text-gray-900 truncate">${highlight(it.model, state.q)}</span>
                  <span class="text-[10px] ${stockColor} font-bold px-1.5 py-0.5 rounded flex-shrink-0">${it.stock}</span>
                </div>
                <p class="text-[11px] text-gray-500 truncate">${highlight(it.brand, state.q)} · ${highlight(it.spec, state.q)}</p>
              </div>
              <div class="text-right flex-shrink-0">
                ${window._AL_canView && window._AL_canView('member')
                  ? `<p class="text-[15px] font-black text-orange-brand font-mono leading-none">¥${it.price}</p>
                     <p class="text-[10px] text-gray-400 mt-1">回收参考价</p>`
                  : `<div class="inline-flex items-center gap-1 bg-orange-surface rounded-lg px-2.5 py-1.5 cursor-pointer" onclick="event.preventDefault();event.stopPropagation();window._AL_lockClick&&_AL_lockClick(event)">
                       <i class="fas fa-lock text-orange-brand text-xs"></i>
                       <span class="text-xs text-orange-brand font-medium whitespace-nowrap">开通会员查看</span>
                     </div>`
                }
              </div>
            </div>
          </a>
        `;
      }).join('');
    }, 280);
  }

  // 搜索提交（页面内搜索：直接更新 q 重新渲染）
  function onSearchSubmit(e) {
    e.preventDefault();
    const input = document.getElementById('searchInput');
    const q = (input.value || '').trim();
    if (!q) { input.focus(); return false; }
    state.q = q;
    document.getElementById('queryText').textContent = q;
    // 同步 URL（便于分享）
    history.replaceState(null, '', '?q=' + encodeURIComponent(q));
    render();
    return false;
  }

  // 点击列表项：跳转到产品详情页
  function showItemDetail(id) {
    window.location.href = 'product.html?id=' + encodeURIComponent(id);
  }

  // 分类切换
  document.querySelectorAll('#catTabs [data-cat]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.cat = btn.dataset.cat;
      document.querySelectorAll('#catTabs [data-cat]').forEach(b => {
        const isActive = b === btn;
        b.className = isActive
          ? 'text-[12px] font-bold text-green-brand border-b-2 border-green-brand py-1.5 px-2.5 flex-shrink-0 transition-colors'
          : 'text-[12px] font-medium text-gray-500 py-1.5 px-2.5 flex-shrink-0 transition-colors';
      });
      render();
    });
  });

  // 排序切换
  const sortOrder = ['default', 'priceAsc', 'priceDesc', 'silver'];
  const sortLabel = { default: '综合', priceAsc: '价低', priceDesc: '价高', silver: '含银量' };
  document.getElementById('sortBtn').addEventListener('click', () => {
    const i = sortOrder.indexOf(state.sort);
    state.sort = sortOrder[(i + 1) % sortOrder.length];
    document.querySelector('[data-sort-label]').textContent = sortLabel[state.sort];
    render();
  });

  // 清除按钮
  (function () {
    const input = document.getElementById('searchInput');
    const clearBtn = document.getElementById('searchClear');
    if (!input || !clearBtn) return;
    const sync = () => {
      const has = input.value.length > 0;
      clearBtn.classList.toggle('hidden', !has);
      clearBtn.classList.toggle('inline-flex', has);
    };
    input.addEventListener('input', sync);
    clearBtn.addEventListener('click', () => {
      // 清空输入
      input.value = '';
      input.focus();
      // 清空状态 + URL
      state.q = '';
      try {
        const url = new URL(location.href);
        url.searchParams.delete('q');
        history.replaceState(null, '', url.pathname + (url.searchParams.toString() ? '?' + url.searchParams.toString() : '') + url.hash);
      } catch (e) {}
      // 隐藏顶部查询关键字 + 重新渲染
      const qt = document.getElementById('queryText');
      if (qt) {
        qt.textContent = '';
        const wrap = qt.closest('div');
        if (wrap) wrap.classList.add('hidden');
      }
      // 切换回"全部"分类并清空排序
      state.cat = 'all';
      state.sort = 'default';
      document.querySelectorAll('[data-cat]').forEach(t => t.classList.remove('active'));
      const allCat = document.querySelector('[data-cat="all"]');
      if (allCat) allCat.classList.add('active');
      render();
      sync();
    });
    sync();
  })();

  // 首次渲染
  render();
</script>

</body>
</html>
