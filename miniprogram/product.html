</script>

<script>
  // 数据从共享脚本 window._AL_PRODUCTS 读取
  const CONTACTS = window._AL_PRODUCTS || [];
  const CAT_IMG = window._AL_CAT_IMG || {};
  const CAT_LABEL = window._AL_CAT_LABEL || {};
  const CAT_COLOR = window._AL_CAT_COLOR || {};
  const COLOR_MAP = {
    green: { bg: 'bg-green-surface', text: 'text-green-dark' },
    amber: { bg: 'bg-amber-surface', text: 'text-amber-dark' },
    cyan:  { bg: 'bg-cyan-surface',  text: 'text-cyan-dark' },
    slate: { bg: 'bg-slate-surface', text: 'text-slate-dark' },
    purple: { bg: 'bg-purple-50', text: 'text-purple-600' },
    gray:  { bg: 'bg-gray-100',      text: 'text-gray-700' }
  };

  // 银价（元/克）演示用
  const SILVER_PRICE_PER_G = 5.6;

  // 读取 id 参数
  const id = new URLSearchParams(location.search).get('id');
  const it = CONTACTS.find(x => x.id === id);

  if (!it) {
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('notFound').classList.remove('hidden');
  } else {
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('mainContent').classList.remove('hidden');
    document.title = it.model + ' - 铝老板金属网';
    document.getElementById('pageTitle').textContent = it.cat === 'contactor' ? '接触器详情' : it.cat === 'breaker' ? '断路器详情' : it.cat === 'relay' ? '继电器详情' : '按钮详情';

    // 1. 图片（优先用本地的 it.img，否则用分类通用图）
    const imgUrl = it.img || CAT_IMG[it.cat] || '';
    const imgEl = document.getElementById('imgEl');
    imgEl.src = imgUrl;
    imgEl.alt = it.model;
    const color = CAT_COLOR[it.cat] || 'gray';
    const fb = document.getElementById('imgFallback');
    fb.className = 'absolute inset-0 flex items-center justify-center text-3xl font-black ' + (COLOR_MAP[color]?.text || 'text-gray-400') + ' opacity-15';
    fb.textContent = it.model;

    // 2. 标题
    document.getElementById('modelName').textContent = it.model;
    document.getElementById('brandSpec').textContent = it.brand + ' · ' + it.spec;

    // 3. 关键参数（回收价格替代库存展示）
    const canViewMember = !!(window._AL_canView && window._AL_canView('member'));
    const canViewPrice = canViewMember;
    // 关键参数只展示公共基础信息（品牌/分类/规格），回收价等敏感数据在下方专区由会员体系承接
    const params = [
      { label: '品牌',   value: it.brand },
      { label: '分类',   value: CAT_LABEL[it.cat] },
      { label: '规格',   value: it.spec, mono: true }
    ];
    document.getElementById('paramGrid').innerHTML = params.map(p => {
      const valueCls = (p.mono ? 'font-mono' : 'font-semibold') + ' text-gray-900 text-[13px]';
      return `
        <div class="bg-gray-bg rounded-xl p-2.5">
          <p class="text-[10px] text-gray-500 mb-0.5">${p.label}</p>
          <p class="${valueCls} truncate">${p.value}</p>
        </div>
      `;
    }).join('');

    // 4. 银点铜回收价（锁区：会员可见）
    const silverCopperEl = document.getElementById('silverCopperEl');
    const silverCopperLocked = document.getElementById('silverCopperLocked');
    if (canViewMember && it.silverCopperPrice) {
      silverCopperEl.textContent = '¥' + it.silverCopperPrice;
      if (silverCopperLocked) silverCopperLocked.classList.add('hidden');
    } else {
      silverCopperEl.textContent = '***';
      // silverCopperLocked 保持显示（已写好的 CTA 覆盖层）
    }

    // 4.5 单位重量表（锁区：会员可见）
    const unitWeightRows = document.getElementById('unitWeightRows');
    const unitWeightLocked = document.getElementById('unitWeightLocked');
    if (Array.isArray(it.unitWeight) && it.unitWeight.length) {
      unitWeightRows.innerHTML = it.unitWeight.map((row, idx) => {
        const rowDelay = (idx * 60) + 'ms';
        if (canViewMember) {
          return `
            <div class="grid grid-cols-[1.2fr_1fr_0.8fr_1fr] gap-2 px-2 py-2.5 items-center slide-up" style="animation-delay:${rowDelay}">
              <div class="flex items-center gap-1.5 min-w-0">
                <span class="w-1.5 h-1.5 rounded-full bg-amber-brand shrink-0"></span>
                <span class="text-[12px] font-semibold text-gray-800 truncate">${row.name}</span>
              </div>
              <div class="text-right text-[12px] font-mono font-bold text-gray-900">${row.weight}</div>
              <div class="text-right text-[11px] font-mono text-amber-dark font-bold">${row.purity}</div>
              <div class="text-right text-[12px] font-mono font-black text-orange-brand">¥${row.value}</div>
            </div>
          `;
        } else {
          return `
            <div class="grid grid-cols-[1.2fr_1fr_0.8fr_1fr] gap-2 px-2 py-2.5 items-center">
              <div class="flex items-center gap-1.5 min-w-0">
                <span class="w-1.5 h-1.5 rounded-full bg-amber-brand/40 shrink-0"></span>
                <span class="text-[12px] font-semibold text-gray-800 truncate">${row.name}</span>
              </div>
              <div class="text-right text-[12px] font-mono font-bold text-gray-400">***</div>
              <div class="text-right text-[11px] font-mono text-gray-400">***</div>
              <div class="text-right text-[12px] font-mono font-black text-gray-400">***</div>
            </div>
          `;
        }
      }).join('');
      if (canViewMember && unitWeightLocked) unitWeightLocked.classList.add('hidden');
    } else {
      // 没有单位重量数据时：会员态显示占位，非会员态保持拦截覆盖层可见
      unitWeightRows.innerHTML = '<div class="px-2 py-4 text-center text-[11px] text-gray-400">暂无单位重量数据</div>';
      if (canViewMember && unitWeightLocked) unitWeightLocked.classList.add('hidden');
    }

    // 5. 含银量（未登录 / 未会员时脱敏 + 全屏覆盖层）
    const silverLocked = document.getElementById('silverLocked');
    if (canViewMember) {
      document.getElementById('silverEl').textContent = it.silver;
      const silverG = parseFloat(it.silver) || 0;
      document.getElementById('silverVal').textContent = '¥' + (silverG * SILVER_PRICE_PER_G).toFixed(2);
      if (silverLocked) silverLocked.classList.add('hidden');
    } else {
      // 脱敏：含银量 / 预估银价 都换成「***」
      document.getElementById('silverEl').textContent = '***';
      document.getElementById('silverVal').textContent = '***';
      // 整卡已通过 onclick 触发 _AL_lockClick 拦截；这里只需保证 silverLocked 覆盖层可见
    }

    // 6. 描述
    document.getElementById('descEl').textContent = it.desc || '暂无详细说明。';

    // 7. 同类推荐（同分类，排除当前，最多 3 条）
    const related = CONTACTS.filter(x => x.cat === it.cat && x.id !== it.id).slice(0, 3);
    document.getElementById('relatedList').innerHTML = related.map(r => {
      const c = COLOR_MAP[CAT_COLOR[r.cat]] || COLOR_MAP.gray;
      const img = r.img || CAT_IMG[r.cat] || '';
      // 会员态：直接显示价格；非会员态：不显示价格（去掉开通会员徽章）
      const priceBlock = canViewMember && r.price
        ? `<p class="text-[14px] font-black text-orange-brand font-mono leading-none">¥${r.price}</p>
           <p class="text-[9px] text-gray-400 font-medium mt-0.5">/件</p>`
        : '';
      return `
        <a href="product.html?id=${r.id}" class="flex items-center gap-3 p-2.5 bg-gray-bg rounded-xl active:scale-[0.99] transition no-underline">
          <div class="w-12 h-12 ${c.bg} rounded-lg flex items-center justify-center flex-shrink-0 overflow-hidden">
            <img src="${img}" alt="${r.model}" loading="lazy" class="w-full h-full object-contain" onerror="this.style.display='none'">
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-[13px] font-bold text-gray-900 truncate">${r.model}</p>
            <p class="text-[10px] text-gray-500 truncate">${r.brand} · ${r.spec}</p>
          </div>
          <div class="shrink-0">
            ${priceBlock}
          </div>
        </a>
      `;
    }).join('');
  }

  // 操作
  function inquiry() {
    // 直接跳到微信客服承载页（miniprogram/wechat-cs.html）
    // 优先用 _AL_navigate（View Transitions API 平滑过渡），降级直接 location.href
    try {
      if (window._AL_navigate) {
        window._AL_navigate('wechat-cs.html');
      } else {
        window.location.href = 'wechat-cs.html';
      }
    } catch (e) {
      window.location.href = 'wechat-cs.html';
    }
  }
  function goPay() {
    if (!it) return;
    if (window._AL_navigate) {
      window._AL_navigate('contacts.html');
    } else {
      window.location.href = 'contacts.html';
    }
  }

  function shareProduct() {
    if (!it) return;
    const url = location.origin + location.pathname + '?id=' + it.id;
    if (navigator.share) {
      navigator.share({ title: it.model, text: `${it.brand} ${it.spec} - ${it.model}`, url }).catch(() => {});
    } else if (navigator.clipboard) {
      navigator.clipboard.writeText(url).then(() => alert('链接已复制到剪贴板')).catch(() => {});
    } else {
      alert(url);
    }
  }
</script>

<!--
  咨询按钮：tel: 链接从 _AL_SITE.phone 统一读取（与联系我们模块保持一致）
  独立 script 块的原因：主 inline script 可能在 render 阶段抛错（找不到产品 / cat 缺字段 / DOM 元素未就绪），
  把这段 IIFE 放在外面，HTML 上已写兜底 href="tel:13217121000"，即使 JS 挂了链接也能用
-->
<script>
  (function () {
    try {
      var el = document.getElementById('consultBtn');
      if (!el) return;
      // 1) 用 _AL_SITE.phone 覆盖 HTML 默认值
      if (window._AL_telLink) {
        el.setAttribute('href', window._AL_telLink());
      }
      // 2) 桌面端点击 tel: 通常无效，给个 toast 提示
      el.addEventListener('click', function () {
        var isMobile = /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent || '');
        if (!isMobile && window._AL_toast) {
          var phone = (window._AL_SITE && window._AL_SITE.phone) || '13217121000';
          window._AL_toast('请使用手机拨打 ' + phone, 2200);
        }
      });
    } catch (e) { /* 兜底：HTML 上已写 tel:13217121000，无需处理 */ }
  })();

  /*
   * 底部三按钮的兜底定义（覆盖主 inline script 里的同名函数）
   * - 主 script 一旦抛错（比如找不到产品），这三个 onClick handler 就 ReferenceError
   * - 在末尾重新定义为最简跳转逻辑，保证按钮永远可用
   * - 不依赖 main script 的 `it` / `render()` 等状态
   */
  window.inquiry = function () {
    try {
      if (window._AL_navigate) window._AL_navigate('wechat-cs.html');
      else window.location.href = 'wechat-cs.html';
    } catch (e) { window.location.href = 'wechat-cs.html'; }
  };
  window.goPay = function () {
    try {
      if (window._AL_navigate) window._AL_navigate('contacts.html');
      else window.location.href = 'contacts.html';
    } catch (e) { window.location.href = 'contacts.html'; }
  };
</script>

<!-- 挂载顶部右侧操作按钮组件（3点菜单 + 头像入口） -->
<script type="module">
  import { mountPageActions } from '/src/components/page-actions.js';
  mountPageActions('#page-actions', {
    onMenu: () => shareProduct(),
    onAvatar: () => location.href = 'mine.html',
  });
</script>
