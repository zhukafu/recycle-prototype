<!DOCTYPE html>
<html lang="zh-CN" style="touch-action: manipulation;">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>金属行情 - 铝老板金属网</title>
<script src="/lib/tailwind/tailwind.js"></script>
<link href="/lib/fonts/fonts-mp-main.css" rel="stylesheet"/>
<script src="/data/quotes.js"></script>
<script>
tailwind.config = {
theme: {
extend: {
colors: {
green: { brand: '#10B981', light: '#34D399', dark: '#059669', surface: '#ECFDF5' },
orange: { brand: '#F97316', light: '#FB923C', dark: '#EA580C', surface: '#FFF7ED' },
red: { brand: '#EF4444', light: '#F87171', dark: '#DC2626', surface: '#FEF2F2' },
amber: { brand: '#F59E0B', light: '#FCD34D', dark: '#D97706', surface: '#FFFBEB' },
slate: { brand: '#64748B', light: '#94A3B8', dark: '#475569', surface: '#F8FAFC' },
cyan: { brand: '#06B6D4', light: '#22D3EE', dark: '#0891B2', surface: '#ECFEFF' },
fuchsia: { brand: '#D946EF', light: '#E879F9', dark: '#A21CAF', surface: '#FDF4FF' },
gray: { bg: '#F5F5F4', card: '#FAFAF9', border: '#E7E5E4' }
},
fontFamily: {
sans: ['Noto Sans SC', 'system-ui', 'sans-serif'],
serif: ['Noto Serif SC', 'serif']
}
}
}
}
</script>
<style>
body { font-family: 'Noto Sans SC', system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
.hide-scrollbar::-webkit-scrollbar { display: none; }
.hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
@keyframes pulse-soft {
0%, 100% { opacity: 1; }
50% { opacity: 0.7; }
}
.pulse-soft { animation: pulse-soft 2s ease-in-out infinite; }
@keyframes shimmer {
0% { transform: translateX(-100%); }
100% { transform: translateX(100%); }
}
.shimmer-effect { position: relative; overflow: hidden; }
.shimmer-effect::after {
content: '';
position: absolute;
top: 0; left: 0; right: 0; bottom: 0;
background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
animation: shimmer 1.5s infinite;
}
@keyframes slideInUp {
from { opacity: 0; transform: translateY(12px); }
to { opacity: 1; transform: translateY(0); }
}
.slide-up { animation: slideInUp 0.4s ease-out forwards; }
</style>
</head>
<body class="bg-gray-bg min-h-screen pb-20">

<!-- 顶部导航栏 -->
<nav class="sticky top-0 z-50 bg-white/95 backdrop-blur-md border-b border-gray-100">
  <div class="flex items-center justify-between px-4 h-11">
    <!-- 返回 -->
    <a href="index.html" class="w-8 h-8 -ml-2 flex items-center justify-center rounded-full active:bg-gray-100 transition-colors">
      <svg class="w-5 h-5 text-gray-700" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"></path>
      </svg>
    </a>
    <!-- 标题 -->
    <h1 class="text-base font-bold text-gray-900">金属行情</h1>
    <!-- 右上角操作 -->
    <div class="flex items-center" id="page-actions"></div>
  </div>
</nav>

<script type="module">
  import { mountPageActions } from '/src/components/page-actions.js';
  mountPageActions('#page-actions', {
    // onMenu: 使用组件默认行为（弹出清除缓存菜单）
    // onAvatar: 使用组件默认行为（回到首页）
  });
</script>

<!-- 行情概览卡片 -->
<div class="px-4 pt-4 pb-3">
  <div class="bg-gradient-to-br from-green-brand to-green-dark rounded-2xl p-4 text-white relative overflow-hidden shadow-lg shadow-green-brand/20">
    <div class="absolute -top-8 -right-8 w-32 h-32 bg-white/10 rounded-full"></div>
    <div class="absolute -bottom-6 -left-6 w-20 h-20 bg-white/5 rounded-full"></div>
    <div class="relative z-10">
      <div class="flex items-center justify-between mb-2">
        <div class="flex items-center gap-1.5">
          <span class="relative flex w-2 h-2">
            <span class="absolute inline-flex w-full h-full rounded-full bg-white opacity-70 animate-ping"></span>
            <span class="relative inline-flex w-2 h-2 rounded-full bg-white"></span>
          </span>
          <span class="text-xs text-white/90 font-medium">实时行情</span>
        </div>
        <button class="text-xs text-white/90 font-semibold flex items-center gap-0.5 active:opacity-60" data-refresh>
          <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99"></path>
          </svg>
          刷新
        </button>
      </div>
      <div class="flex items-end justify-between">
        <div>
          <p class="text-[11px] text-white/75">更新时间</p>
          <p class="text-sm font-bold font-mono" id="updateTime">--</p>
        </div>
        <div class="text-right">
          <p class="text-[11px] text-white/75">上涨品种</p>
          <p class="text-lg font-black"><span class="text-white" id="upCount">--</span><span class="text-xs text-white/70 ml-1">/ <span id="totalCount">--</span></span></p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 分类切换 Tab -->
<div class="sticky top-11 z-40 bg-gray-bg/95 backdrop-blur-sm border-b border-gray-200/60">
  <div class="flex overflow-x-auto hide-scrollbar px-4">
    <button class="py-3 px-3 text-sm font-bold text-green-brand border-b-2 border-green-brand whitespace-nowrap transition-colors" data-cat-trigger="precious">贵金属</button>
    <button class="py-3 px-3 text-sm font-medium text-gray-500 whitespace-nowrap transition-colors" data-cat-trigger="nonferrous">有色金属</button>
    <button class="py-3 px-3 text-sm font-medium text-gray-500 whitespace-nowrap transition-colors" data-cat-trigger="rare">稀有金属</button>
    <button class="py-3 px-3 text-sm font-medium text-gray-500 whitespace-nowrap transition-colors" data-cat-trigger="ferrous">黑色金属</button>
    <button class="py-3 px-3 text-sm font-medium text-gray-500 whitespace-nowrap transition-colors" data-cat-trigger="scrap">废料</button>
  </div>
</div>

<!-- 行情列表 -->
<div class="px-4 pt-3 space-y-2" id="quoteList"></div>

<!-- 底部固定导航栏 -->
<div id="app-bottom-nav" data-active-nav="quotes"></div>

<script type="module">
  import { mountBottomNav } from '/src/components/bottom-nav.js';
  const slot = document.getElementById('app-bottom-nav');
  mountBottomNav(slot, { active: slot.dataset.activeNav || 'quotes' });
</script>

<script>
  // 行情数据：从 quotes.js 加载（window._AL_QUOTES）
  var _quotesAPI = window._AL_QUOTES;

  function getQuoteData() {
    if (!_quotesAPI) return {};
    var data = _quotesAPI.getData();
    return (data && data.quotes) || {};
  }

  function refreshSummary() {
    if (!_quotesAPI) return;
    var summary = _quotesAPI.getSummary();
    var upEl = document.getElementById('upCount');
    var totalEl = document.getElementById('totalCount');
    var timeEl = document.getElementById('updateTime');
    if (upEl) upEl.textContent = summary.upCount;
    if (totalEl) totalEl.textContent = summary.total;
    if (timeEl) timeEl.textContent = summary.updatedAt;
  }

  var CAT_LABEL = {
    precious: '贵金属',
    nonferrous: '有色金属',
    rare: '稀有金属',
    ferrous: '黑色金属',
    scrap: '废料回收'
  };

  function renderList(cat) {
    var list = document.getElementById('quoteList');
    var QUOTE_DATA = getQuoteData();
    var items = QUOTE_DATA[cat] || [];
    if (items.length === 0) {
      list.innerHTML = '<div class="text-center py-12 text-gray-400 text-sm">暂无数据</div>';
      return;
    }
    list.innerHTML = items.map((it, idx) => {
      const trendColor = it.up ? 'text-green-brand' : 'text-red-brand';
      const arrow = it.up
        ? '<svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M7 14l5-5 5 5z"/></svg>'
        : '<svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>';
      // 迷你折线（演示用：8 个点）
      const points = it.up
        ? '0,18 12,16 24,15 36,12 48,13 60,9 72,8 84,5'
        : '0,5 12,8 24,9 36,11 48,10 60,14 72,15 84,18';
      const stroke = it.up ? '#10B981' : '#EF4444';
      return `
        <div class="bg-white rounded-2xl p-3.5 flex items-center gap-3 shadow-[0_2px_8px_rgba(0,0,0,0.03)] border border-gray-100 active:scale-[0.99] transition-transform slide-up" style="animation-delay: ${idx * 0.04}s">
          <!-- 金属标识 -->
          <div class="w-11 h-11 rounded-xl bg-${it.color}-surface flex items-center justify-center flex-shrink-0">
            <div class="text-center leading-none">
              <p class="text-[10px] text-${it.color}-dark font-bold">${it.code}</p>
            </div>
          </div>
          <!-- 名称 + 备注 -->
          <div class="flex-1 min-w-0">
            <div class="flex items-baseline gap-1.5">
              <span class="text-[15px] font-bold text-gray-900">${it.name}</span>
              <span class="text-[10px] text-gray-400">${it.unit}</span>
            </div>
            <p class="text-[11px] text-gray-400 truncate mt-0.5">${it.note}</p>
          </div>
          <!-- 迷你走势图 -->
          <div class="w-16 h-9 flex-shrink-0">
            <svg width="64" height="36" viewBox="0 0 84 24" preserveAspectRatio="none">
              <polyline points="${points}" fill="none" stroke="${stroke}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
            </svg>
          </div>
          <!-- 价格 + 涨跌幅 -->
          <div class="text-right flex-shrink-0 min-w-[70px]">
            <p class="text-[15px] font-black text-gray-900 font-mono leading-none">${it.price}</p>
            <p class="text-[10px] ${trendColor} font-bold mt-1 flex items-center justify-end gap-0.5 font-mono">
              ${arrow}${it.change}
            </p>
            <p class="text-[10px] ${trendColor} font-semibold font-mono">${it.pct}</p>
          </div>
        </div>
      `;
    }).join('');
  }

  // 分类 Tab 切换
  (function () {
    const triggers = document.querySelectorAll('[data-cat-trigger]');
    const activeClass = ['py-3', 'px-3', 'text-sm', 'font-bold', 'text-green-brand', 'border-b-2', 'border-green-brand', 'whitespace-nowrap', 'transition-colors'];
    const inactiveClass = ['py-3', 'px-3', 'text-sm', 'font-medium', 'text-gray-500', 'whitespace-nowrap', 'transition-colors'];

    function activate(key) {
      triggers.forEach(t => {
        const isActive = t.dataset.catTrigger === key;
        t.className = (isActive ? activeClass : inactiveClass).join(' ');
      });
      renderList(key);
    }
    triggers.forEach(t => t.addEventListener('click', () => activate(t.dataset.catTrigger)));
  })();

  // 初始化：渲染贵金属 + 汇总
  refreshSummary();
  renderList('precious');

  // 刷新按钮 + 基于后台配置的自动刷新
  (function () {
    var btn = document.querySelector('[data-refresh]');
    var list = document.getElementById('quoteList');
    var svg = btn ? btn.querySelector('svg') : null;
    if (svg) svg.style.transition = 'transform 0.6s ease';
    var timer = null;

    // 从 localStorage 重新加载真实数据并刷新页面
    function refreshFromStorage() {
      var activeTrigger = document.querySelector('[data-cat-trigger].text-green-brand') ||
                          document.querySelector('.border-b-2.border-green-brand');
      var currentCat = (activeTrigger && activeTrigger.dataset.catTrigger) || 'precious';
      renderList(currentCat);
      refreshSummary();
    }

    // 启动/重启自动刷新定时器
    function startAutoRefresh() {
      if (timer) clearInterval(timer);
      var intervalSec = 900; // 默认 15 分钟
      if (_quotesAPI && _quotesAPI.getRefreshInterval) {
        intervalSec = _quotesAPI.getRefreshInterval();
      }
      if (intervalSec <= 0) return; // 0 表示手动刷新，不启动定时器
      timer = setInterval(function () {
        refreshFromStorage();
      }, intervalSec * 1000);
    }

    // 手动刷新按钮
    if (btn) {
      btn.addEventListener('click', function () {
        if (list) list.classList.add('shimmer-effect');
        if (svg) svg.style.transform = 'rotate(' + (Date.now() % 360) + 'deg)';
        setTimeout(function () {
          if (list) list.classList.remove('shimmer-effect');
          if (svg) svg.style.transform = '';
          refreshFromStorage();
        }, 600);
      });
    }

    // 页面可见性变化：隐藏时停止，恢复时重启并立即刷新
    document.addEventListener('visibilitychange', function () {
      if (document.hidden) {
        if (timer) { clearInterval(timer); timer = null; }
      } else {
        refreshFromStorage();
        startAutoRefresh();
      }
    });

    // 启动
    startAutoRefresh();
  })();
</script>

</body>
</html>
