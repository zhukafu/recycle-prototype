  <style>
    body { font-family: 'Noto Sans SC', sans-serif; -webkit-font-smoothing: antialiased; background: #F8FAFC; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .touch-active:active { transform: scale(0.97); transition: transform 0.1s; }
    .gradient-green { background: linear-gradient(135deg, #10B981 0%, #059669 100%); }
    .gradient-orange { background: linear-gradient(135deg, #F97316 0%, #EA580C 100%); }
    .gradient-blue { background: linear-gradient(135deg, #3B82F6 0%, #1D4ED8 100%); }
    .gradient-red { background: linear-gradient(135deg, #EF4444 0%, #DC2626 100%); }
    .gradient-purple { background: linear-gradient(135deg, #8B5CF6 0%, #7C3AED 100%); }
    .gradient-teal { background: linear-gradient(135deg, #14B8A6 0%, #0D9488 100%); }
    .gradient-yellow { background: linear-gradient(135deg, #F59E0B 0%, #D97706 100%); }
    .gradient-pink { background: linear-gradient(135deg, #EC4899 0%, #DB2777 100%); }
    .gradient-banner { background: linear-gradient(135deg, #DBEAFE 0%, #BFDBFE 50%, #93C5FD 100%); }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-in { animation: fadeInUp 0.5s ease-out forwards; }
    .stagger-1 { animation-delay: 0.05s; opacity: 0; }
    .stagger-2 { animation-delay: 0.1s; opacity: 0; }
    .stagger-3 { animation-delay: 0.15s; opacity: 0; }

  <script type="module">
    import { mountBottomNav } from '/src/components/bottom-nav.js';
    const slot = document.getElementById('app-bottom-nav');
    mountBottomNav(slot, { active: slot.dataset.activeNav || 'quotes' });
  </script>

  <script>
    // 接触器数据库搜索：跳转到搜索结果页
    function onDbSearchSubmit(e) {
      e.preventDefault();
      const input = document.getElementById('dbSearchInput');
      if (!input) return false;
      const q = (input.value || '').trim();
      if (!q) { input.focus(); return false; }
      window.location.href = 'search-results.html?q=' + encodeURIComponent(q);
      return false;
    }

    // 选接触器咨询横幅：跳到微信客服承载页
    // - 优先 _AL_navigate（View Transitions API 平滑过渡）
    // - 降级 location.href
    // - 返回 false 让 <a> 的 href 兜底（即使 JS 挂了也能跳）
    window.navToWechatCS = function (e) {
      try {
        if (window._AL_navigate) {
          e.preventDefault();
          window._AL_navigate('wechat-cs.html');
          return false;
        }
      } catch (err) { /* 降级走 href */ }
      return true;
    };

    // 「最新上架」8 张卡片：数据驱动渲染 + 登录态脱敏
    // 独立 try/catch IIFE：主 render 抛错不影响主流程
    (function renderLatest() {
      try {
        const list = document.getElementById('latestList');
        if (!list) return;
        const all = window._AL_PRODUCTS || [];
        // 取 c8 ~ c15 共 8 张「最新上架」卡片（按 id 顺序）
        const ids = ['c8','c9','c10','c11','c12','c13','c14','c15'];
        const items = ids.map(id => all.find(p => p.id === id)).filter(Boolean);
        if (!items.length) { list.innerHTML = ''; return; }

        const canViewMember = !!(window._AL_canView && window._AL_canView('member'));
        const lockHtml = canViewMember ? '' : ((window._AL_lockBadge || function () { return ''; })());
        const esc = (s) => String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

        list.innerHTML = items.map(it => {
          // 主标题：优先 title 字段；缺失时回退到 model
          const title = it.title || it.model || '';
          // 副标题：优先 subtitle 字段；缺失时回退到 brand + spec
          const subtitle = it.subtitle || (it.brand + (it.spec ? ' · ' + it.spec : ''));
          // 兜底缩略图：用分类色块图
          const fallback = (window._AL_CAT_IMG || {})[it.cat] || '';
          const imgSrc = it.img || fallback;
          // 会员态：显示回收价格；非会员态：显示锁徽章
          let priceHtml = '';
          if (canViewMember && it.price) {
            priceHtml = '<p class="text-sm font-black text-al-orange font-mono leading-none">¥' + esc(it.price) + '<span class="text-[10px] text-al-gray font-normal ml-0.5">/件</span></p>';
          } else if (!canViewMember) {
            priceHtml = lockHtml;
          }
          return (
            '<a href="product.html?id=' + esc(it.id) + '" ' +
                 'aria-label="查看 ' + esc(title) + ' 详情" ' +
                 'class="block product-card bg-white rounded-xl shadow-soft overflow-hidden no-underline touch-active active:scale-[0.98] transition-transform">' +
              '<div class="aspect-square bg-al-gray-light relative">' +
                (imgSrc ? '<img src="' + esc(imgSrc) + '" class="w-full h-full object-cover" alt="' + esc(title) + '" onerror="this.style.display=\'none\'">' : '') +
              '</div>' +
              '<div class="p-3">' +
                '<h4 class="text-sm font-semibold text-al-dark leading-snug mb-1 truncate" title="' + esc(title) + '">' + esc(title) + '</h4>' +
                '<p class="text-xs text-al-gray mb-2 truncate" title="' + esc(subtitle) + '">' + esc(subtitle) + '</p>' +
                priceHtml +
              '</div>' +
            '</a>'
          );
        }).join('');
      } catch (e) { /* 渲染失败不阻塞主页 */ }
    })();
  </script>

  <style>

    .line-clamp-2 {

      line-clamp: 2;
